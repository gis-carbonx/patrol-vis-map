<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patrol Monitoring</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>

<style>
html,body{margin:0;height:100%;font-family:'Segoe UI'}
#map{height:100%}

/* PANEL */
.panel{
position:absolute;
top:20px;
right:20px;
z-index:1000;
width:330px;
background:rgba(255,255,255,0.85);
backdrop-filter:blur(14px);
border-radius:16px;
padding:15px;
box-shadow:0 8px 25px rgba(0,0,0,0.15);
}

/* TOTAL */
.total-wrapper{
display:flex;
justify-content:center;
align-items:center;
gap:10px;
}
.total-main{font-size:28px;font-weight:600;}
.total-sub{font-size:18px;color:#FF5722;display:none;}

/* FILTER */
.filter-box{
display:flex;
gap:5px;
margin-bottom:10px;
}
.filter-box input{
flex:1;
padding:6px;
border-radius:6px;
border:1px solid #ccc;
}

/* BUTTON */
#resetFilter{
margin-top:8px;
width:100%;
padding:7px;
border:none;
border-radius:6px;
background:#111;
color:white;
}

/* TOGGLE */
.toggle{
display:flex;
justify-content:space-between;
margin-top:8px;
font-size:13px;
}

/* ===== POPUP MODERN ===== */
.leaflet-popup-content-wrapper{
border-radius:14px;
padding:0;
overflow:hidden;
}

/* IMAGE FIX RATIO */
.popup-img-container{
width:100%;
aspect-ratio:1/1; /* 🔥 selalu kotak */
overflow:hidden;
background:#eee;
}
.popup-img{
width:100%;
height:100%;
object-fit:cover;
cursor:pointer;
}

/* CONTENT */
.popup-body{
padding:10px;
}
.popup-title{
font-weight:600;
font-size:14px;
margin-bottom:4px;
}
.popup-meta{
font-size:11px;
color:#666;
margin-bottom:6px;
}
.popup-desc{
font-size:12px;
line-height:1.4;
}

/* MODAL IMAGE ZOOM */
.img-modal{
display:none;
position:fixed;
z-index:9999;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
justify-content:center;
align-items:center;
}
.img-modal img{
max-width:90%;
max-height:90%;
border-radius:10px;
transition:0.3s;
cursor:zoom-out;
}
</style>
</head>

<body>

<div id="map"></div>

<div class="panel">

<div class="filter-box">
<input type="date" id="startDate">
<input type="date" id="endDate">
</div>

<div class="total-wrapper">
<div id="totalMain" class="total-main">0</div>
<div id="totalSub" class="total-sub"></div>
</div>

<canvas id="chart" height="180"></canvas>
<button id="resetFilter">Show All</button>

<div class="toggle">
<span>LULC</span>
<input type="checkbox" id="toggleLulc" checked>
</div>
<div class="toggle">
<span>Boundary</span>
<input type="checkbox" id="toggleBoundary" checked>
</div>
<div class="toggle">
<span>Points</span>
<input type="checkbox" id="togglePoints" checked>
</div>

</div>

<div id="modal" class="img-modal">
<img id="modalImg">
</div>

<script>

/* ================= MAP ================= */
const map=L.map('map',{center:[0.8,110.325],zoom:13});
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

const lulc=L.tileLayer('./data/Tiles/{z}/{x}/{y}.png').addTo(map);
let boundaryLayer;
let pointLayer=L.layerGroup().addTo(map);

/* ================= BOUNDARY ================= */
fetch('data/CMI.json')
.then(r=>r.json())
.then(j=>{
boundaryLayer=L.geoJSON(j,{style:{color:"#7B1FA2"}}).addTo(map);
map.fitBounds(boundaryLayer.getBounds());
});

/* ================= DATA ================= */
const url="https://docs.google.com/spreadsheets/d/e/2PACX-1vRKjzBR_BgGYWpnWUvGYzmo4rLbT2iGm2oI1fzjs1wJdPguDpw2UPZXrZQqcXPrGxwJ7PBeDCzHazAj/pub?output=csv";

let rawData=[];
let chart;

Papa.parse(url,{
download:true,
header:true,
complete:(res)=>{
rawData=res.data;
updateMap();
}
});

/* ================= DATE PARSER (FIX 🔥) ================= */
function parseDate(str){
if(!str) return null;
const d=new Date(str);
return isNaN(d)?null:d;
}

/* ================= UPDATE ================= */
function updateMap(){

pointLayer.clearLayers();

let counts={};
let total=0;

const start=parseDate(document.getElementById('startDate').value);
const end=parseDate(document.getElementById('endDate').value);

rawData.forEach(r=>{

const coord=r['data-coordinate'];
if(!coord) return;

const d=parseDate(r['data-start_date']);

/* 🔥 DATE FILTER FIX */
if(start && d && d < start) return;
if(end && d && d > end) return;

const [lat,lon]=coord.split(',').map(Number);
if(isNaN(lat)) return;

const cat=r['data-survey-categ']||"Unknown";
counts[cat]=(counts[cat]||0)+1;
total++;

const img=convert(r['data-documentation-image_1']);

const popup=`
<div>
${img?`
<div class="popup-img-container">
<img class="popup-img" src="${img}" onclick="openModal('${img}')">
</div>`:''}

<div class="popup-body">
<div class="popup-title">${cat}</div>
<div class="popup-meta">
Officer: ${r['data-base_info-nama']||'-'}<br>
Date: ${r['data-start_date']||'-'}
</div>
<div class="popup-desc">
${r['data-survey-description']||''}
</div>
</div>
</div>`;

const m=L.marker([lat,lon]).bindPopup(popup);
m.category=cat;
pointLayer.addLayer(m);

});

document.getElementById('totalMain').innerText=total;

/* CHART */
if(chart) chart.destroy();

const labels=Object.keys(counts);
const values=Object.values(counts);

chart=new Chart(document.getElementById('chart'),{
type:'pie',
data:{labels,datasets:[{data:values,backgroundColor:gen(labels.length)}]},
options:{
plugins:{legend:{position:'bottom'}},
onClick:(e,el)=>{
if(!el.length)return;
const idx=el[0].index;
const cat=labels[idx];
highlight(cat,values[idx]);
}
}
});
}

/* ================= FILTER ================= */
function highlight(cat,count){

const sub=document.getElementById('totalSub');

if(!cat){
sub.style.display='none';
pointLayer.eachLayer(m=>m.setOpacity(1));
return;
}

sub.style.display='block';
sub.innerText=count;

pointLayer.eachLayer(m=>{
m.setOpacity(m.category===cat?1:0.2);
});
}

/* ================= EVENTS ================= */
document.getElementById('resetFilter').onclick=()=>{
document.getElementById('startDate').value="";
document.getElementById('endDate').value="";
updateMap();
};

document.getElementById('startDate').onchange=updateMap;
document.getElementById('endDate').onchange=updateMap;

/* LAYER */
document.getElementById('toggleLulc').onchange=e=>{
e.target.checked?map.addLayer(lulc):map.removeLayer(lulc);
};
document.getElementById('toggleBoundary').onchange=e=>{
if(!boundaryLayer)return;
e.target.checked?map.addLayer(boundaryLayer):map.removeLayer(boundaryLayer);
};
document.getElementById('togglePoints').onchange=e=>{
e.target.checked?map.addLayer(pointLayer):map.removeLayer(pointLayer);
};

/* ================= UTIL ================= */
function convert(url){
if(!url)return null;
const id=url.match(/[-\w]{25,}/);
return id?`https://drive.google.com/thumbnail?id=${id[0]}&sz=w1000`:null;
}
function gen(n){
return Array.from({length:n},(_,i)=>`hsl(${i*360/n},70%,60%)`);
}

/* ================= IMAGE ZOOM ================= */
const modal=document.getElementById('modal');
const modalImg=document.getElementById('modalImg');

function openModal(src){
modal.style.display="flex";
modalImg.src=src;
}
modal.onclick=()=>modal.style.display="none";

</script>

</body>
</html>
