<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patrol Monitoring</title>

<link rel="icon" type="image/png" href="./data/CMI-Brandmark-FullColor-BlackBG.png">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>

<style>
html, body {
  height: 100%;
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
}
#map {
  height: 100%;
  width: 100%;
}

/* 🔥 TOP TITLE */
#map-title {
  position: absolute;
  top: 15px;
  left: 20px;
  z-index: 1000;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 20px;
  font-weight: 600;
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(10px);
  padding: 8px 14px;
  border-radius: 12px;
}
#map-title img { height: 30px; }

/* 🔥 GLASS PANEL */
.panel {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 1000;

  width: 340px;
  background: rgba(255,255,255,0.75);
  backdrop-filter: blur(14px);
  border-radius: 16px;
  padding: 15px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.15);
}

/* 🔥 TOTAL CARD */
.total-box {
  text-align: center;
  margin-bottom: 10px;
}
.total-box h1 {
  margin: 0;
  font-size: 28px;
}
.total-box span {
  font-size: 13px;
  color: #666;
}

/* 🔥 BUTTON */
#resetFilter {
  margin-top: 10px;
  width: 100%;
  padding: 8px;
  border: none;
  border-radius: 8px;
  background: #111;
  color: white;
  cursor: pointer;
}
#resetFilter:hover {
  background: #333;
}

/* 🔥 POPUP MODERN */
.leaflet-popup-content-wrapper {
  border-radius: 14px;
  padding: 0;
  overflow: hidden;
}
.popup-card {
  font-family: 'Segoe UI';
}
.popup-img {
  width: 100%;
  height: 140px;
  object-fit: cover;
}
.popup-body {
  padding: 10px;
}
.popup-title {
  font-weight: 600;
  margin-bottom: 5px;
}
.popup-meta {
  font-size: 12px;
  color: #666;
}
.popup-desc {
  font-size: 13px;
  margin-top: 6px;
}

/* 🔥 IMAGE MODAL */
.img-modal {
  display: none;
  position: fixed;
  z-index: 9999;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  justify-content: center;
  align-items: center;
}
.img-modal img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 10px;
}
</style>
</head>

<body>

<div id="map"></div>

<div id="map-title">
  <img src="data/CMI-Brandmark-FullColor-BlackBG.png">
  Patrol Monitoring
</div>

<!-- 🔥 SIMPLE MODERN PANEL -->
<div class="panel">
  <div class="total-box">
    <h1 id="totalPoints">-</h1>
    <span>Total Observations</span>
  </div>

  <canvas id="categoryChart" height="200"></canvas>
  <button id="resetFilter">Show All</button>
</div>

<div id="imageModal" class="img-modal">
  <img id="modalImage">
</div>

<script>

/* ================= MAP ================= */
const map = L.map('map', {
  center: [0.8, 110.325],
  zoom: 13,
  zoomControl: false
});
L.control.zoom({ position: 'bottomright' }).addTo(map);

/* SINGLE BASEMAP (SIMPLE) */
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}')
.addTo(map);

/* LULC */
const lulcTiles = L.tileLayer('./data/Tiles/{z}/{x}/{y}.png');
lulcTiles.addTo(map);

/* ================= BOUNDARY ================= */
fetch('data/CMI.json')
.then(res => res.json())
.then(json => {
  const boundary = L.geoJSON(json, {
    style: { color: "#7B1FA2", weight: 3 }
  }).addTo(map);
  map.fitBounds(boundary.getBounds());
});

/* ================= DATA ================= */
const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRKjzBR_BgGYWpnWUvGYzmo4rLbT2iGm2oI1fzjs1wJdPguDpw2UPZXrZQqcXPrGxwJ7PBeDCzHazAj/pub?output=csv";

let markers = [];
let categoryCount = {};
let total = 0;

Papa.parse(sheetURL, {
  download: true,
  header: true,
  complete: (results) => {

    results.data.forEach(row => {
      const coord = row['data-coordinate'];
      if (!coord) return;

      const [lat, lon] = coord.split(',').map(Number);
      if (isNaN(lat)) return;

      total++;
      const cat = row['data-survey-categ'] || "Unknown";
      categoryCount[cat] = (categoryCount[cat] || 0) + 1;

      const img = convertGoogleDriveLink(row['data-documentation-image_1']);

      const popup = `
      <div class="popup-card">
        ${img ? `<img class="popup-img" src="${img}" onclick="openModal('${img}')">` : ''}
        <div class="popup-body">
          <div class="popup-title">${cat}</div>
          <div class="popup-meta">${row['data-base_info-nama'] || ''}</div>
          <div class="popup-desc">${row['data-survey-description'] || ''}</div>
        </div>
      </div>`;

      const marker = L.marker([lat, lon])
        .bindPopup(popup)
        .addTo(map);

      marker.category = cat;
      markers.push(marker);
    });

    document.getElementById("totalPoints").innerText = total;

    createChart();
  }
});

/* ================= CHART ================= */
function createChart() {
  const labels = Object.keys(categoryCount);
  const values = Object.values(categoryCount);

  let selectedCategory = null;

  new Chart(document.getElementById("categoryChart"), {
    type: 'pie',
    data: {
      labels,
      datasets: [{
        data: values,
        backgroundColor: generateColors(labels.length)
      }]
    },
    options: {
      plugins: {
        legend: { position: 'bottom' }
      },
      onClick: (evt, el) => {
        if (!el.length) return;
        const idx = el[0].index;
        const cat = labels[idx];

        selectedCategory = selectedCategory === cat ? null : cat;
        highlightMarkers(selectedCategory);
      }
    }
  });

  document.getElementById("resetFilter").onclick = () => {
    selectedCategory = null;
    highlightMarkers(null);
  };
}

/* ================= FILTER ================= */
function highlightMarkers(category) {
  markers.forEach(m => {
    const visible = !category || m.category === category;
    m.setOpacity(visible ? 1 : 0.2);
  });
}

/* ================= UTIL ================= */
function convertGoogleDriveLink(url) {
  if (!url) return null;
  const id = url.match(/[-\w]{25,}/);
  return id ? `https://drive.google.com/thumbnail?id=${id[0]}&sz=w1000` : null;
}

function generateColors(n) {
  return Array.from({length:n},(_,i)=>`hsl(${i*360/n},70%,60%)`);
}

/* ================= IMAGE MODAL ================= */
const modal = document.getElementById("imageModal");
const modalImg = document.getElementById("modalImage");

function openModal(src){
  modal.style.display = "flex";
  modalImg.src = src;
}
modal.onclick = () => modal.style.display = "none";

</script>

</body>
</html>
