<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patrol Monitoring</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>

<style>
html,body{margin:0;height:100%;font-family:'Segoe UI'}
#map{height:100%}

/* PANEL */
.panel{
  position:absolute;
  top:20px;
  right:20px;
  z-index:1000;
  width:340px;
  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(14px);
  border-radius:16px;
  padding:15px;
  box-shadow:0 8px 25px rgba(0,0,0,0.2);
}

/* TOTAL */
.total-wrapper{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
}
.total-main{font-size:28px;font-weight:700;}
.total-sub{font-size:18px;color:#FF5722;display:none;}

/* FILTER */
.filter-box{
  display:flex;
  flex-direction:column;
  gap:6px;
  margin-bottom:10px;
}
.filter-box input, .filter-box select{
  padding:6px;
  border-radius:6px;
  border:1px solid #ccc;
  font-size:13px;
}

/* BUTTON */
#resetFilter{
  margin-top:8px;
  width:100%;
  padding:7px;
  border:none;
  border-radius:6px;
  background:#111;
  color:white;
  cursor:pointer;
}

/* TOGGLE */
.toggle{
  display:flex;
  justify-content:space-between;
  margin-top:8px;
  font-size:13px;
}

/* ===== POPUP ===== */
.leaflet-popup-content-wrapper{
  border-radius:14px;
  padding:0;
  overflow:hidden;
  width:280px;
}

.popup-img-container{
  width:100%;
  height:180px;
  overflow:hidden;
  background:#eee;
}
.popup-img{
  width:100%;
  height:100%;
  object-fit:cover;
  cursor:pointer;
}

/* CONTENT */
.popup-body{padding:10px;}
.popup-category{
  font-size:10px;
  font-weight:700;
  color:#888;
  text-transform:uppercase;
}
.popup-title{
  font-size:14px;
  font-weight:700;
  margin:4px 0;
}
.popup-meta{
  font-size:11px;
  color:#666;
  margin-bottom:6px;
}
.popup-desc{
  font-size:12px;
  line-height:1.4;
}

/* MODAL */
.img-modal{
  display:none;
  position:fixed;
  z-index:9999;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
}
.img-modal img{
  max-width:90%;
  max-height:90%;
  border-radius:10px;
}
</style>
</head>

<body>

<div id="map"></div>

<div class="panel">

  <div class="filter-box">
    <input type="date" id="startDate">
    <input type="date" id="endDate">

    <!-- Filter 1: Officer (data-base_info-nama) -->
    <select id="filterOfficer"><option value="">All Officer</option></select>

    <!-- Filter 2: Category (data-survey-categ) — AND with Officer -->
    <select id="filterCategory"><option value="">All Category</option></select>

    <!-- Filter 3: Finding (data-survey-finding) — AND with Officer & Category -->
    <select id="filterFinding"><option value="">All Finding</option></select>
  </div>

  <div class="total-wrapper">
    <div id="totalMain" class="total-main">0</div>
    <div id="totalSub" class="total-sub"></div>
  </div>

  <canvas id="chart" height="180"></canvas>

  <button id="resetFilter">Show All</button>

  <div class="toggle"><span>LULC</span><input type="checkbox" id="toggleLulc" checked></div>
  <div class="toggle"><span>Boundary</span><input type="checkbox" id="toggleBoundary" checked></div>
  <div class="toggle"><span>Points</span><input type="checkbox" id="togglePoints" checked></div>

</div>

<div id="modal" class="img-modal">
  <img id="modalImg">
</div>

<script>

/* ── MAP ── */
const map = L.map('map', { center: [0.8, 110.325], zoom: 13 });
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

const lulc = L.tileLayer('./data/Tiles/{z}/{x}/{y}.png').addTo(map);
let boundaryLayer;
let pointLayer = L.layerGroup().addTo(map);

/* ── BOUNDARY ── */
fetch('data/CMI.json')
  .then(r => r.json())
  .then(j => {
    boundaryLayer = L.geoJSON(j, {
      style: { color: "#7B1FA2", weight: 3, fillOpacity: 0 }
    }).addTo(map);
    map.fitBounds(boundaryLayer.getBounds());
  });

/* ── DATA ── */
const url = "YOUR_CSV_URL";

let rawData = [];
let chart;
let selectedChart = null;  // category selected via pie chart click

Papa.parse(url, {
  download: true,
  header: true,
  complete: (res) => {
    rawData = res.data;
    initDropdowns();
    updateMap();
  }
});

/* ── DATE PARSE (robust dd-MMM-yyyy) ── */
function parseDate(s) {
  if (!s) return null;
  const d = new Date(s);
  if (!isNaN(d)) return d;
  const parts = s.split("-");
  if (parts.length === 3) {
    const day   = parseInt(parts[0]);
    const month = new Date(parts[1] + " 1, 2000").getMonth();
    const year  = parseInt(parts[2]);
    return new Date(year, month, day);
  }
  return null;
}

/* ── DROPDOWN INIT ──
   Populate from rawData — no pre-filtering so all unique values appear.
   AND logic is enforced in updateMap(), not here.
*/
function initDropdowns() {
  const officers = new Set();
  const cats     = new Set();
  const finds    = new Set();

  rawData.forEach(r => {
    if (r['data-base_info-nama'])   officers.add(r['data-base_info-nama']);
    if (r['data-survey-categ'])     cats.add(r['data-survey-categ']);
    if (r['data-survey-finding'])   finds.add(r['data-survey-finding']);
  });

  fillSelect(filterOfficer,   officers);
  fillSelect(filterCategory,  cats);
  fillSelect(filterFinding,   finds);
}

function fillSelect(el, set) {
  set.forEach(v => {
    if (!v) return;
    const opt = document.createElement("option");
    opt.value       = v;
    opt.textContent = v;
    el.appendChild(opt);
  });
}

/* ── MAIN UPDATE ──
   All active filters are applied with AND logic:
   date range  AND  officer  AND  category  AND  finding  AND  chart-click
*/
function updateMap() {

  pointLayer.clearLayers();

  const counts = {};
  let total = 0;

  const start = parseDate(startDate.value);
  const end   = parseDate(endDate.value);

  // Current filter values
  const selOfficer  = filterOfficer.value;
  const selCategory = filterCategory.value;
  const selFinding  = filterFinding.value;

  rawData.forEach(r => {

    const coord = r['data-coordinate'];
    if (!coord) return;

    // ── FILTER: date range (AND) ──
    const d = parseDate(r['data-start_date']);
    if (start && d && d < start) return;
    if (end   && d && d > end)   return;

    // ── FILTER: officer (AND) ──
    if (selOfficer  && r['data-base_info-nama']  !== selOfficer)  return;

    // ── FILTER: category (AND) ──
    if (selCategory && r['data-survey-categ']    !== selCategory) return;

    // ── FILTER: finding (AND) ──
    if (selFinding  && r['data-survey-finding']  !== selFinding)  return;

    // ── FILTER: pie chart click (AND) ──
    if (selectedChart && r['data-survey-categ']  !== selectedChart) return;

    // ── PASSED ALL FILTERS — plot point ──
    const [lat, lon] = coord.split(',').map(Number);
    if (isNaN(lat)) return;

    const cat     = r['data-survey-categ']    || "Unknown";
    const finding = r['data-survey-finding']  || "-";

    counts[cat] = (counts[cat] || 0) + 1;
    total++;

    const img = convert(r['data-documentation-image_1']);

    const popup = `
      <div>
        ${img ? `<div class="popup-img-container">
          <img class="popup-img zoomable" src="${img}">
        </div>` : ''}
        <div class="popup-body">
          <div class="popup-category">${cat}</div>
          <div class="popup-title">${finding}</div>
          <div class="popup-meta">
            ${r['data-base_info-nama'] || '-'}<br>
            ${r['data-start_date']     || '-'}
          </div>
          <div class="popup-desc">
            ${r['data-survey-description'] || ''}
          </div>
        </div>
      </div>`;

    const m = L.marker([lat, lon]).bindPopup(popup);
    m.category = cat;
    pointLayer.addLayer(m);
  });

  /* ── TOTAL DISPLAY ── */
  totalMain.innerText = total;

  /* ── PIE CHART ── */
  if (chart) chart.destroy();

  const labels = Object.keys(counts);
  const values = Object.values(counts);

  chart = new Chart(document.getElementById('chart'), {
    type: 'pie',
    data: {
      labels,
      datasets: [{ data: values, backgroundColor: gen(labels.length) }]
    },
    options: {
      plugins: { legend: { position: 'bottom' } },
      onClick: (e, el) => {
        if (!el.length) return;

        const cat = labels[el[0].index];
        const val = values[el[0].index];

        if (selectedChart === cat) {
          // second click → deselect
          selectedChart = null;
          totalSub.style.display = 'none';
        } else {
          selectedChart = cat;
          totalSub.style.display = 'block';
          totalSub.innerText = val;
        }

        updateMap();
      }
    }
  });
}

/* ── EVENT LISTENERS ── */
[startDate, endDate, filterOfficer, filterCategory, filterFinding].forEach(el => {
  el.onchange = updateMap;
});

resetFilter.onclick = () => {
  startDate.value       = "";
  endDate.value         = "";
  filterOfficer.value   = "";
  filterCategory.value  = "";
  filterFinding.value   = "";
  selectedChart         = null;
  totalSub.style.display = 'none';
  updateMap();
};

/* ── LAYER TOGGLES ── */
toggleLulc.onchange     = e => e.target.checked ? map.addLayer(lulc)          : map.removeLayer(lulc);
toggleBoundary.onchange = e => boundaryLayer && (e.target.checked ? map.addLayer(boundaryLayer) : map.removeLayer(boundaryLayer));
togglePoints.onchange   = e => e.target.checked ? map.addLayer(pointLayer)    : map.removeLayer(pointLayer);

/* ── IMAGE MODAL ── */
document.addEventListener('click', function(e) {
  if (e.target.classList.contains('zoomable')) {
    modal.style.display = 'flex';
    modalImg.src = e.target.src;
  }
});
modal.onclick = () => modal.style.display = 'none';

/* ── UTILITIES ── */
function convert(url) {
  if (!url) return null;
  const id = url.match(/[-\w]{25,}/);
  return id ? `https://drive.google.com/thumbnail?id=${id[0]}&sz=w1000` : null;
}

function gen(n) {
  return Array.from({ length: n }, (_, i) => `hsl(${i * 360 / n}, 70%, 60%)`);
}

</script>
</body>
</html>
