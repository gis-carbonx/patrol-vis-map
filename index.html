<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Patrol Monitoring</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>

<style>
html,body{margin:0;height:100%;font-family:'Segoe UI'}
#map{height:100%}


.panel{
position:absolute;
top:20px;
right:20px;
z-index:1000;
width:320px;
background:rgba(255,255,255,0.8);
backdrop-filter:blur(14px);
border-radius:16px;
padding:15px;
box-shadow:0 8px 25px rgba(0,0,0,0.15);
}

.total-wrapper{
display:flex;
justify-content:center;
align-items:center;
gap:10px;
transition:all .3s ease;
}
.total-main{
font-size:28px;
font-weight:600;
}
.total-sub{
font-size:18px;
color:#FF5722;
display:none;
}

.filter-box{
margin-bottom:10px;
display:flex;
gap:5px;
}
.filter-box input{
flex:1;
padding:5px;
border-radius:6px;
border:1px solid #ccc;
}

.toggle{
display:flex;
justify-content:space-between;
margin-top:8px;
font-size:13px;
}
.toggle input{
cursor:pointer;
}

#resetFilter{
margin-top:8px;
width:100%;
padding:6px;
border:none;
border-radius:6px;
background:#111;
color:white;
}

.popup-img{
width:100%;
height:120px;
object-fit:cover;
border-radius:10px 10px 0 0;
}
.popup-body{padding:8px}
.popup-title{font-weight:600}

.img-modal{
display:none;
position:fixed;
z-index:9999;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
}
.img-modal img{max-width:90%}
</style>
</head>

<body>

<div id="map"></div>

<div class="panel">

<div class="filter-box">
<input type="date" id="startDate">
<input type="date" id="endDate">
</div>

<div class="total-wrapper">
<div id="totalMain" class="total-main">0</div>
<div id="totalSub" class="total-sub"></div>
</div>

<canvas id="chart" height="180"></canvas>

<button id="resetFilter">Show All</button>

<div class="toggle">
<span>LULC</span>
<input type="checkbox" id="toggleLulc" checked>
</div>
<div class="toggle">
<span>Boundary</span>
<input type="checkbox" id="toggleBoundary" checked>
</div>
<div class="toggle">
<span>Points</span>
<input type="checkbox" id="togglePoints" checked>
</div>

</div>

<div id="modal" class="img-modal">
<img id="modalImg">
</div>

<script>

const map = L.map('map',{center:[0.8,110.325],zoom:13});
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

const lulc = L.tileLayer('./data/Tiles/{z}/{x}/{y}.png').addTo(map);
let boundaryLayer;
let pointLayer = L.layerGroup().addTo(map);

fetch('data/CMI.json')
.then(r=>r.json())
.then(j=>{
boundaryLayer=L.geoJSON(j,{style:{color:"#7B1FA2"}}).addTo(map);
map.fitBounds(boundaryLayer.getBounds());
});

const url="https://docs.google.com/spreadsheets/d/e/2PACX-1vRKjzBR_BgGYWpnWUvGYzmo4rLbT2iGm2oI1fzjs1wJdPguDpw2UPZXrZQqcXPrGxwJ7PBeDCzHazAj/pub?output=csv";

let rawData=[];
let chart;
let selectedCategory=null;

Papa.parse(url,{
download:true,
header:true,
complete:(res)=>{
rawData=res.data;
updateMap();
}
});

function updateMap(){

pointLayer.clearLayers();

let counts={};
let total=0;

const start=document.getElementById('startDate').value;
const end=document.getElementById('endDate').value;

rawData.forEach(r=>{

const coord=r['data-coordinate'];
if(!coord) return;

const date=r['data-start_date'];
if(start && date < start) return;
if(end && date > end) return;

const [lat,lon]=coord.split(',').map(Number);
if(isNaN(lat)) return;

const cat=r['data-survey-categ']||"Unknown";

counts[cat]=(counts[cat]||0)+1;
total++;

const img=convert(r['data-documentation-image_1']);

const popup=`
<div>
${img?`<img class="popup-img" src="${img}" onclick="openModal('${img}')">`:''}
<div class="popup-body">
<div class="popup-title">${cat}</div>
<div>${r['data-survey-description']||''}</div>
</div>
</div>`;

const m=L.marker([lat,lon]).bindPopup(popup);
m.category=cat;
pointLayer.addLayer(m);

});

document.getElementById('totalMain').innerText=total;

if(chart) chart.destroy();

const labels=Object.keys(counts);
const values=Object.values(counts);

chart=new Chart(document.getElementById('chart'),{
type:'pie',
data:{labels,datasets:[{data:values,backgroundColor:gen(labels.length)}]},
options:{
plugins:{legend:{position:'bottom'}},
onClick:(e,el)=>{
if(!el.length)return;
const cat=labels[el[0].index];

selectedCategory=selectedCategory===cat?null:cat;
highlight(cat,counts[cat]);
}
}
});

}

function highlight(cat,count){

const sub=document.getElementById('totalSub');

if(!cat){
sub.style.display='none';
pointLayer.eachLayer(m=>m.setOpacity(1));
return;
}

sub.style.display='block';
sub.innerText=count;

pointLayer.eachLayer(m=>{
m.setOpacity(m.category===cat?1:0.2);
});
}

document.getElementById('resetFilter').onclick=()=>{
selectedCategory=null;
updateMap();
};

document.getElementById('startDate').onchange=updateMap;
document.getElementById('endDate').onchange=updateMap;

/* LAYER TOGGLE */
document.getElementById('toggleLulc').onchange=e=>{
e.target.checked?map.addLayer(lulc):map.removeLayer(lulc);
};

document.getElementById('toggleBoundary').onchange=e=>{
if(!boundaryLayer)return;
e.target.checked?map.addLayer(boundaryLayer):map.removeLayer(boundaryLayer);
};

document.getElementById('togglePoints').onchange=e=>{
e.target.checked?map.addLayer(pointLayer):map.removeLayer(pointLayer);
};

function convert(url){
if(!url)return null;
const id=url.match(/[-\w]{25,}/);
return id?`https://drive.google.com/thumbnail?id=${id[0]}&sz=w1000`:null;
}
function gen(n){
return Array.from({length:n},(_,i)=>`hsl(${i*360/n},70%,60%)`);
}

const modal=document.getElementById('modal');
const modalImg=document.getElementById('modalImg');
function openModal(src){
modal.style.display='flex';
modalImg.src=src;
}
modal.onclick=()=>modal.style.display='none';

</script>

</body>
</html>
