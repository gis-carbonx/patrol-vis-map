<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patrol Monitoring</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>

<style>
html, body { margin:0; height:100%; font-family:'Segoe UI'; background:#0f172a; }
#map { height:100%; }

/* ===== GLASS UI ===== */
.glass {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  border-radius: 16px;
  color: white;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}

/* ===== TOP BAR ===== */
#topbar {
  position:absolute; top:15px; left:15px; z-index:1000;
  padding:10px 16px;
  display:flex; align-items:center; gap:10px;
}
#topbar img { height:30px; }
#topbar span { font-weight:600; font-size:16px; }

/* ===== FLOAT BUTTONS ===== */
.fab-container {
  position:absolute; right:15px; bottom:120px;
  display:flex; flex-direction:column; gap:10px;
  z-index:1000;
}
.fab {
  width:50px; height:50px;
  border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer;
  font-size:20px;
  transition:0.2s;
}
.fab:hover { transform:scale(1.1); }

/* ===== BOTTOM PANEL ===== */
#bottomPanel {
  position:absolute;
  bottom:0; left:0; right:0;
  height:90px;
  z-index:1000;
  transition:0.3s;
  overflow:hidden;
}
#bottomPanel.expanded { height:55%; }

#panelHandle {
  text-align:center;
  cursor:pointer;
  padding:6px;
  font-size:18px;
}

#panelContent {
  padding:15px;
}

/* ===== CARD ===== */
.card {
  padding:10px;
  border-radius:12px;
  margin-bottom:10px;
}

/* ===== MODAL ===== */
.img-modal {
  display:none; position:fixed; top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.9);
  justify-content:center; align-items:center;
  z-index:9999;
}
.img-modal img { max-width:90%; max-height:90%; }

/* ===== SLIDER ===== */
input[type=range] {
  width:100%;
}
</style>
</head>

<body>

<div id="map"></div>

<!-- TOP BAR -->
<div id="topbar" class="glass">
  <img src="data/CMI-Brandmark-FullColor-BlackBG.png">
  <span>Patrol Monitoring</span>
</div>

<!-- FLOAT BUTTON -->
<div class="fab-container">
  <div class="fab glass" id="btnMeasure">📏</div>
  <div class="fab glass" id="btnLayer">🗺️</div>
</div>

<!-- BOTTOM PANEL -->
<div id="bottomPanel" class="glass">
  <div id="panelHandle">▲</div>
  <div id="panelContent">

    <div class="card glass">
      <h3 id="totalPoints">0 Data</h3>
    </div>

    <div class="card glass">
      <canvas id="chart"></canvas>
    </div>

    <div class="card glass">
      <b>LULC Opacity</b>
      <input id="opacitySlider" type="range" min="0" max="1" step="0.1" value="1">
    </div>

  </div>
</div>

<!-- IMAGE MODAL -->
<div id="imageModal" class="img-modal">
  <img id="modalImage">
</div>

<script>

// ================= MAP =================
const map = L.map('map', {
  center:[0.8,110.325],
  zoom:13,
  zoomControl:false
});

L.control.zoom({ position:'bottomright' }).addTo(map);

const satellite = L.tileLayer(
  'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
).addTo(map);

// ================= LULC =================
const lulcTiles = L.tileLayer('./data/Tiles/{z}/{x}/{y}.png').addTo(map);
document.getElementById('opacitySlider').oninput = e => {
  lulcTiles.setOpacity(e.target.value);
};

// ================= BOUNDARY =================
fetch('data/CMI.json')
.then(res=>res.json())
.then(json=>{
  const layer = L.geoJSON(json,{style:{color:'purple',weight:2}}).addTo(map);
  map.fitBounds(layer.getBounds());
});

// ================= DATA =================
let markers=[], categoryCount={}, total=0;

Papa.parse("https://docs.google.com/spreadsheets/d/e/2PACX-1vRKjzBR_BgGYWpnWUvGYzmo4rLbT2iGm2oI1fzjs1wJdPguDpw2UPZXrZQqcXPrGxwJ7PBeDCzHazAj/pub?output=csv",{
  download:true, header:true,
  complete:(res)=>{
    res.data.forEach(row=>{
      const coord=row['data-coordinate'];
      if(!coord) return;

      const [lat,lon]=coord.split(',').map(Number);
      if(isNaN(lat)) return;

      total++;
      const cat=row['data-survey-categ']||"Unknown";
      categoryCount[cat]=(categoryCount[cat]||0)+1;

      const marker=L.marker([lat,lon]).addTo(map)
        .bindPopup(`<b>${cat}</b>`);

      marker.category=cat;
      markers.push(marker);
    });

    document.getElementById("totalPoints").innerText = total + " Observations";

    new Chart(document.getElementById("chart"),{
      type:'doughnut',
      data:{
        labels:Object.keys(categoryCount),
        datasets:[{data:Object.values(categoryCount)}]
      }
    });
  }
});

// ================= MODAL =================
const modal=document.getElementById("imageModal");
function openModal(src){
  modal.style.display="flex";
  document.getElementById("modalImage").src=src;
}
modal.onclick=()=>modal.style.display="none";

// ================= BOTTOM PANEL =================
const panel=document.getElementById("bottomPanel");
document.getElementById("panelHandle").onclick=()=>{
  panel.classList.toggle("expanded");
};

// ================= MEASURE =================
let measuring=false, line;

document.getElementById("btnMeasure").onclick=()=>{
  measuring=!measuring;
};

map.on('click',(e)=>{
  if(!measuring) return;

  if(!line){
    line=L.polyline([e.latlng],{color:'red'}).addTo(map);
  } else {
    line.addLatLng(e.latlng);
  }
});

</script>

</body>
</html>
