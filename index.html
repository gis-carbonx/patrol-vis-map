<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patrol Monitoring</title>

<link rel="icon" type="image/png" href="./data/CMI-Brandmark-FullColor-BlackBG.png">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>

<style>
html, body {
  height: 100%;
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
}

#map {
  height: 100%;
  width: 100%;
}

/* ===== TITLE ===== */
#map-title {
  position: absolute;
  top: 20px;
  left: 20px;
  z-index: 1000;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 26px;
  font-weight: 700;
  color: white;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(6px);
  padding: 10px 15px;
  border-radius: 12px;
}

#map-title img {
  height: 35px;
}

/* ===== PANEL MODERN ===== */
.panel {
  position: absolute;
  z-index: 1000;
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(10px);
  border-radius: 14px;
  padding: 12px;
  width: 300px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.25);
}

#infoPanel { top: 20px; right: 20px; }
#basemapPanel { bottom: 20px; left: 20px; width: 180px; }

.panel h3 {
  margin: 0 0 8px 0;
  font-size: 16px;
}

button {
  width: 100%;
  padding: 6px;
  border: none;
  border-radius: 8px;
  background: #333;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #111;
}

/* ===== BASEMAP BUTTON ===== */
.basemap-btn {
  margin-top: 5px;
  background: #f0f0f0;
  color: black;
}

.basemap-btn:hover {
  background: #ddd;
}

/* ===== POPUP ===== */
.popup-content {
  font-size: 13px;
}

.popup-content img {
  width: 100%;
  border-radius: 8px;
  margin-top: 6px;
}

/* ===== MODAL ===== */
.img-modal {
  display: none;
  position: fixed;
  z-index: 9999;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  justify-content: center;
  align-items: center;
}

.img-modal img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 10px;
}

.img-modal span {
  position: absolute;
  top: 20px;
  right: 40px;
  color: white;
  font-size: 35px;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="map"></div>

<div id="map-title">
  <img src="data/CMI-Brandmark-FullColor-BlackBG.png">
  Patrol Dashboard
</div>

<!-- INFO PANEL -->
<div id="infoPanel" class="panel">
  <h3>Statistics</h3>
  <p id="totalPoints">-</p>
  <canvas id="categoryChart"></canvas>
  <button id="resetFilter">Reset Filter</button>

  <hr>
  <h3>LULC Opacity</h3>
  <input id="opacitySlider" type="range" min="0" max="1" step="0.1" value="1">
</div>

<!-- BASEMAP -->
<div id="basemapPanel" class="panel">
  <h3>Basemap</h3>
  <div id="basemapContent"></div>
</div>

<!-- MODAL -->
<div id="imageModal" class="img-modal">
  <span id="closeModal">&times;</span>
  <img id="modalImage">
</div>

<script>

// ===== MAP =====
const basemaps = {
  "OSM": L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'),
  "Satellite": L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}')
};

const map = L.map('map', {
  center: [0.8, 110.3],
  zoom: 13,
  layers: [basemaps["Satellite"]]
});

// ===== LULC =====
const lulcTiles = L.tileLayer('./data/Tiles/{z}/{x}/{y}.png');
lulcTiles.addTo(map);

// ===== BASEMAP BUTTON =====
const baseDiv = document.getElementById("basemapContent");
let currentBase = basemaps["Satellite"];

Object.keys(basemaps).forEach(name => {
  const btn = document.createElement("button");
  btn.innerText = name;
  btn.className = "basemap-btn";

  btn.onclick = () => {
    map.removeLayer(currentBase);
    currentBase = basemaps[name];
    currentBase.addTo(map);
  };

  baseDiv.appendChild(btn);
});

// ===== DATA =====
const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRKjzBR_BgGYWpnWUvGYzmo4rLbT2iGm2oI1fzjs1wJdPguDpw2UPZXrZQqcXPrGxwJ7PBeDCzHazAj/pub?output=csv";

let markers = [];
let categoryCount = {};
let total = 0;

Papa.parse(sheetURL, {
  download: true,
  header: true,
  complete: (results) => {

    results.data.forEach(row => {
      const coord = row['data-coordinate'];
      if (!coord) return;

      const [lat, lon] = coord.split(',').map(Number);
      if (isNaN(lat)) return;

      total++;

      const cat = row['data-survey-categ'] || "Unknown";
      categoryCount[cat] = (categoryCount[cat] || 0) + 1;

      const img = convertLink(row['data-documentation-image_1']);

      const popup = `
      <div class="popup-content">
        <b>${cat}</b><br>
        ${row['data-survey-finding'] || ''}<br>
        <small>${row['data-base_info-nama'] || ''}</small>
        ${img ? `<img src="${img}" onclick="openModal('${img}')">` : ''}
      </div>`;

      const marker = L.marker([lat, lon])
        .bindPopup(popup)
        .addTo(map);

      marker.category = cat;
      markers.push(marker);
    });

    document.getElementById("totalPoints").innerText =
      "Total Points: " + total;

    createChart();
  }
});

// ===== CHART =====
function createChart(){
  const ctx = document.getElementById("categoryChart");

  new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: Object.keys(categoryCount),
      datasets: [{
        data: Object.values(categoryCount)
      }]
    }
  });
}

// ===== FILTER =====
document.getElementById("resetFilter").onclick = () => {
  markers.forEach(m => m.setOpacity(1));
};

// ===== IMAGE =====
function convertLink(url){
  if(!url) return null;
  const id = url.match(/[-\w]{25,}/);
  return id ? `https://drive.google.com/thumbnail?id=${id[0]}` : null;
}

function openModal(src){
  document.getElementById("imageModal").style.display = "flex";
  document.getElementById("modalImage").src = src;
}

document.getElementById("closeModal").onclick = () => {
  document.getElementById("imageModal").style.display = "none";
};

// ===== OPACITY =====
document.getElementById("opacitySlider").oninput = (e) => {
  lulcTiles.setOpacity(e.target.value);
};

</script>
</body>
</html>
