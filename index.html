<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Patrol</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>

<style>
html, body { height:100%; margin:0; font-family: 'Segoe UI'; }
#map { height:100%; }

/* TITLE */
#title {
  position:absolute;
  top:15px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(255,255,255,0.7);
  backdrop-filter:blur(8px);
  padding:8px 16px;
  border-radius:10px;
  font-weight:600;
  z-index:1000;
}

/* SIDEBAR */
#sidebar {
  position:absolute;
  left:15px;
  top:15px;
  width:260px;
  background:rgba(0,0,0,0.65);
  backdrop-filter:blur(12px);
  color:white;
  padding:15px;
  border-radius:16px;
  z-index:1000;
}

#sidebar h3 { margin-top:10px; }

/* INSIGHT */
#insight {
  position:absolute;
  right:15px;
  top:15px;
  width:260px;
  background:rgba(255,255,255,0.85);
  backdrop-filter:blur(12px);
  padding:15px;
  border-radius:16px;
  z-index:1000;
}

/* BUTTON */
button {
  width:100%;
  margin-top:5px;
  padding:7px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#444;
  color:white;
}
button:hover { background:#222; }

/* FAB */
#fab {
  position:absolute;
  bottom:20px;
  right:20px;
  z-index:1000;
}

.fab-btn {
  width:45px;
  height:45px;
  border-radius:50%;
  background:#333;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  margin-top:8px;
  cursor:pointer;
  box-shadow:0 4px 10px rgba(0,0,0,0.3);
}
.fab-btn:hover { transform:scale(1.1); }

</style>
</head>

<body>

<div id="map"></div>

<div id="title">Patrol Intelligence Dashboard</div>

<div id="sidebar">
  <h3>Filter</h3>
  <select id="categoryFilter"></select>
  <button onclick="resetFilter()">Reset</button>

  <h3>Analysis</h3>
  <button onclick="toggleGrid()">Toggle Grid</button>
</div>

<div id="insight">
  <h3>Statistics</h3>
  <p id="total">-</p>
  <canvas id="chart"></canvas>
  <p id="insightText" style="margin-top:10px;font-size:13px;"></p>
</div>

<div id="fab">
  <div class="fab-btn" onclick="map.setView([0.8,110.325],13)">📍</div>
</div>

<script>

// ================= MAP =================
const map = L.map('map', {
  center: [0.8,110.325],
  zoom: 13,
  preferCanvas: true
});

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// ================= VARIABLES =================
let markers = [];
let categoryCount = {};
let gridLayer;
let gridVisible = false;

// ================= COLOR =================
function getColor(cat){
  const map = {
    "Illegal Logging":"red",
    "Wildlife":"green",
    "Encroachment":"orange"
  };
  return map[cat] || "blue";
}

// ================= LOAD DATA =================
const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRKjzBR_BgGYWpnWUvGYzmo4rLbT2iGm2oI1fzjs1wJdPguDpw2UPZXrZQqcXPrGxwJ7PBeDCzHazAj/pub?output=csv";

Papa.parse(sheetURL, {
  download:true,
  header:true,
  complete:(res)=>{

    res.data.forEach(row=>{
      const coord = row['data-coordinate'];
      if(!coord) return;

      const [lat,lon] = coord.split(',').map(Number);
      const cat = row['data-survey-categ'] || "Unknown";

      categoryCount[cat] = (categoryCount[cat]||0)+1;

      const marker = L.circleMarker([lat,lon],{
        radius:6,
        color:getColor(cat),
        fillOpacity:0.8
      }).addTo(map)
      .bindPopup(`<b>${cat}</b><br>${row['data-survey-description'] || ''}`);

      marker.category = cat;
      markers.push(marker);
    });

    buildUI();
  }
});

// ================= UI =================
function buildUI(){

  document.getElementById("total").innerText =
    "Total Points: " + markers.length;

  const labels = Object.keys(categoryCount);
  const values = Object.values(categoryCount);

  new Chart(document.getElementById("chart"), {
    type:'pie',
    data:{ labels, datasets:[{ data:values }] }
  });

  const select = document.getElementById("categoryFilter");
  select.innerHTML = `<option value="">All</option>`;
  labels.forEach(c=>{
    select.innerHTML += `<option value="${c}">${c}</option>`;
  });

  select.onchange = ()=>{
    filterCategory(select.value);
  };

  generateInsight(labels, values);
}

// ================= INSIGHT =================
function generateInsight(labels, values){
  let max = Math.max(...values);
  let idx = values.indexOf(max);

  document.getElementById("insightText").innerText =
    "Dominant finding: " + labels[idx];
}

// ================= FILTER =================
function filterCategory(cat){
  markers.forEach(m=>{
    if(!cat || m.category===cat){
      m.setStyle({opacity:1, fillOpacity:0.8});
    } else {
      m.setStyle({opacity:0.1, fillOpacity:0.1});
    }
  });
}

function resetFilter(){
  filterCategory(null);
}

// ================= GRID =================
const gridURL = "https://drive.google.com/uc?export=download&id=148vZDiPQxhCOnxZ-8eqlxvcy0H0__oub";

fetch(gridURL)
.then(res=>res.json())
.then(data=>{
  gridLayer = L.geoJSON(data,{
    style:{
      color:'#555',
      weight:1,
      fillOpacity:0
    }
  });
});

// ================= GRID ANALYSIS =================
function calculateGrid(){

  gridLayer.eachLayer(cell=>{
    let count = 0;

    markers.forEach(m=>{
      if(cell.getBounds().contains(m.getLatLng())){
        count++;
      }
    });

    cell.setStyle({
      fillColor:getGridColor(count),
      fillOpacity:0.6
    });

    cell.bindPopup("Count: " + count);
  });
}

function getGridColor(c){
  return c > 10 ? '#800026' :
         c > 5  ? '#BD0026' :
         c > 2  ? '#E31A1C' :
         c > 1  ? '#FC4E2A' :
                  '#FFEDA0';
}

// ================= TOGGLE GRID =================
function toggleGrid(){
  if(!gridLayer) return;

  if(!gridVisible){
    gridLayer.addTo(map);
    calculateGrid();
    gridVisible = true;
  } else {
    map.removeLayer(gridLayer);
    gridVisible = false;
  }
}

</script>
</body>
</html>
