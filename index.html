<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patrol 2 Monitoring</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>

<style>
html, body { height:100%; margin:0; font-family:'Segoe UI'; }
#map { height:100%; }

/* 🔥 TOP TITLE */
#map-title {
  position:absolute; top:15px; left:20px; z-index:1000;
  display:flex; align-items:center; gap:10px;
  background:rgba(255,255,255,0.7);
  backdrop-filter:blur(10px);
  padding:8px 14px;
  border-radius:12px;
  font-weight:600;
}

/* 🔥 PANEL RIGHT TOP */
.panel {
  position:absolute;
  top:15px;
  right:15px;
  z-index:1000;

  width:300px;
  background:rgba(255,255,255,0.75);
  backdrop-filter:blur(14px);
  border-radius:16px;
  padding:15px;
  box-shadow:0 8px 25px rgba(0,0,0,0.15);
}

/* 🔢 TOTAL */
.total-box {
  text-align:center;
  transition:all 0.3s ease;
}
.total-main {
  font-size:26px;
  font-weight:700;
}
.total-sub {
  font-size:14px;
  color:#444;
  opacity:0;
  transform:translateY(-5px);
}
.total-sub.show {
  opacity:1;
  transform:translateY(0);
}

/* 📅 DATE FILTER */
.date-filter {
  display:flex;
  gap:5px;
  margin-bottom:10px;
}
.date-filter input {
  width:100%;
  padding:6px;
  border-radius:6px;
  border:1px solid #ccc;
  font-size:12px;
}

/* BUTTON */
#resetFilter {
  margin-top:8px;
  width:100%;
  padding:7px;
  border:none;
  border-radius:8px;
  background:#111;
  color:white;
  cursor:pointer;
}

/* POPUP */
.leaflet-popup-content-wrapper {
  border-radius:14px;
  padding:0;
  overflow:hidden;
}
.popup-card img {
  width:100%;
  height:140px;
  object-fit:cover;
}
.popup-body {
  padding:10px;
}
.popup-title { font-weight:600; }
.popup-desc { font-size:13px; }

/* MODAL */
.img-modal {
  display:none;
  position:fixed;
  z-index:9999;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}
.img-modal img {
  max-width:90%;
  max-height:90%;
}
</style>
</head>

<body>

<div id="map"></div>

<div id="map-title">Patrol Monitoring</div>

<div class="panel">
  
  <!-- 📅 DATE FILTER -->
  <div class="date-filter">
    <input type="date" id="startDate">
    <input type="date" id="endDate">
  </div>

  <!-- 🔢 TOTAL -->
  <div class="total-box">
    <div class="total-main" id="totalPoints">-</div>
    <div class="total-sub" id="categoryCount"></div>
  </div>

  <canvas id="categoryChart" height="200"></canvas>
  <button id="resetFilter">Show All</button>
</div>

<div id="imageModal" class="img-modal">
  <img id="modalImage">
</div>

<script>

/* MAP */
const map = L.map('map', {
  center:[0.8,110.325],
  zoom:13
});

L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}')
.addTo(map);

/* GLOBAL */
let markers = [];
let rawData = [];
let selectedCategory = null;

/* LOAD DATA */
const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRKjzBR_BgGYWpnWUvGYzmo4rLbT2iGm2oI1fzjs1wJdPguDpw2UPZXrZQqcXPrGxwJ7PBeDCzHazAj/pub?output=csv";

Papa.parse(sheetURL, {
  download:true,
  header:true,
  complete:(res)=>{
    rawData = res.data;
    applyFilter();
  }
});

/* FILTER FUNCTION */
function applyFilter(){

  markers.forEach(m=>map.removeLayer(m));
  markers = [];

  const start = document.getElementById('startDate').value;
  const end = document.getElementById('endDate').value;

  let categoryCount = {};
  let total = 0;

  rawData.forEach(row=>{
    const coord = row['data-coordinate'];
    if(!coord) return;

    const date = row['data-start_date'];
    if(start && date < start) return;
    if(end && date > end) return;

    const [lat,lon] = coord.split(',').map(Number);
    if(isNaN(lat)) return;

    total++;

    const cat = row['data-survey-categ'] || "Unknown";
    categoryCount[cat]=(categoryCount[cat]||0)+1;

    const img = convertGoogleDriveLink(row['data-documentation-image_1']);

    const popup = `
    <div class="popup-card">
      ${img ? `<img src="${img}" onclick="openModal('${img}')">` : ''}
      <div class="popup-body">
        <div class="popup-title">${cat}</div>
        <div class="popup-desc">${row['data-survey-description']||''}</div>
      </div>
    </div>`;

    const m = L.marker([lat,lon]).bindPopup(popup).addTo(map);
    m.category = cat;
    markers.push(m);
  });

  document.getElementById("totalPoints").innerText = total;

  updateChart(categoryCount);
}

/* CHART */
let chart;

function updateChart(categoryCount){
  const labels = Object.keys(categoryCount);
  const values = Object.values(categoryCount);

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("categoryChart"),{
    type:'pie',
    data:{
      labels,
      datasets:[{data:values,backgroundColor:generateColors(labels.length)}]
    },
    options:{
      plugins:{legend:{position:'bottom'}},
      onClick:(evt,el)=>{
        if(!el.length) return;

        const idx = el[0].index;
        const cat = labels[idx];

        selectedCategory = selectedCategory===cat ? null : cat;

        highlightMarkers(selectedCategory);

        const sub = document.getElementById("categoryCount");

        if(selectedCategory){
          sub.innerText = `${cat}: ${values[idx]}`;
          sub.classList.add("show");
        }else{
          sub.classList.remove("show");
        }
      }
    }
  });
}

/* FILTER MARKER */
function highlightMarkers(cat){
  markers.forEach(m=>{
    const show = !cat || m.category===cat;
    m.setOpacity(show?1:0.2);
  });
}

/* DATE EVENT */
document.getElementById('startDate').onchange = applyFilter;
document.getElementById('endDate').onchange = applyFilter;

/* RESET */
document.getElementById("resetFilter").onclick = ()=>{
  selectedCategory=null;
  document.getElementById("categoryCount").classList.remove("show");
  highlightMarkers(null);
};

/* UTIL */
function convertGoogleDriveLink(url){
  if(!url) return null;
  const id=url.match(/[-\w]{25,}/);
  return id?`https://drive.google.com/thumbnail?id=${id[0]}&sz=w1000`:null;
}
function generateColors(n){
  return Array.from({length:n},(_,i)=>`hsl(${i*360/n},70%,60%)`);
}

/* MODAL */
const modal=document.getElementById("imageModal");
const modalImg=document.getElementById("modalImage");
function openModal(src){
  modal.style.display="flex";
  modalImg.src=src;
}
modal.onclick=()=>modal.style.display="none";

</script>
</body>
</html>
