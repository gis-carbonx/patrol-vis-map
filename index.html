<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patrol f Monitoring</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>

<style>
html,body{height:100%;margin:0;font-family:'Segoe UI'}
#map{height:100%}

/* TITLE */
#map-title{
position:absolute;top:15px;left:20px;z-index:1000;
background:rgba(255,255,255,0.7);
padding:8px 14px;border-radius:12px;
backdrop-filter:blur(10px)
}

/* LEGEND */
#legend{
position:absolute;top:15px;right:15px;z-index:1000;
background:rgba(255,255,255,0.8);
backdrop-filter:blur(10px);
padding:12px;border-radius:12px;
font-size:13px;
}
.legend-item{display:flex;align-items:center;margin-bottom:4px}
.legend-color{width:14px;height:14px;margin-right:6px}

/* BOTTOM PANEL */
#panel{
position:absolute;bottom:0;width:100%;
height:60px;transition:.3s;
background:rgba(255,255,255,0.85);
backdrop-filter:blur(14px);
border-top-left-radius:20px;border-top-right-radius:20px;
overflow:hidden;z-index:1000;
}
#panel.open{height:60%}
#handle{width:40px;height:5px;background:#aaa;margin:10px auto;border-radius:10px;cursor:pointer}

#content{padding:10px;height:calc(100% - 30px);overflow:auto}

/* STATS */
.stats{display:flex;gap:10px}
#chartBox{width:40%}
#tableBox{width:60%}

/* TABLE */
table{width:100%;border-collapse:collapse;font-size:13px}
td{padding:6px;border-bottom:1px solid #ddd;cursor:pointer}
tr:hover{background:#eee}

/* POPUP */
.leaflet-popup-content-wrapper{width:250px}
.carousel img{width:100%;height:130px;object-fit:cover}
.carousel-controls{text-align:center}
.carousel-controls button{margin:2px}

/* MODAL */
#modal{
display:none;position:fixed;width:100%;height:100%;
background:rgba(0,0,0,0.8);z-index:9999;
justify-content:center;align-items:center
}
#modal img{max-width:90%;max-height:90%}
</style>
</head>

<body>

<div id="map"></div>

<div id="map-title">Patrol Monitoring</div>

<!-- LEGEND -->
<div id="legend">
<b>LULC 2023</b>
<div class="legend-item"><div class="legend-color" style="background:#ec4040"></div>Building</div>
<div class="legend-item"><div class="legend-color" style="background:#5c9640"></div>Forest</div>
<div class="legend-item"><div class="legend-color" style="background:#b6cce1"></div>Water</div>
</div>

<!-- PANEL -->
<div id="panel">
<div id="handle"></div>
<div id="content">

<h3 id="total">Total: -</h3>

<div class="stats">
<div id="chartBox">
<canvas id="chart"></canvas>
</div>

<div id="tableBox">
<table id="table"></table>
</div>
</div>

</div>
</div>

<div id="modal"><img id="modalImg"></div>

<script>

/* MAP */
const map=L.map('map',{zoomControl:false}).setView([0.8,110.325],13);

L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);
L.tileLayer('./data/Tiles/{z}/{x}/{y}.png').addTo(map);

/* DATA */
let markers=[],counts={},total=0;

Papa.parse("https://docs.google.com/spreadsheets/d/e/2PACX-1vRKjzBR_BgGYWpnWUvGYzmo4rLbT2iGm2oI1fzjs1wJdPguDpw2UPZXrZQqcXPrGxwJ7PBeDCzHazAj/pub?output=csv",{
download:true,header:true,
complete:(res)=>{

res.data.forEach(r=>{
const c=r['data-coordinate']; if(!c)return;
const [lat,lon]=c.split(',').map(Number);
if(isNaN(lat))return;

total++;
const cat=r['data-survey-categ']||"Unknown";
counts[cat]=(counts[cat]||0)+1;

/* MULTI IMAGE */
let imgs=[];
['data-documentation-image_1','data-documentation-image_2'].forEach(k=>{
const u=convert(r[k]); if(u) imgs.push(u);
});

let idx=0;
const popup=`
<div>
<div class="carousel">
${imgs.length?`<img src="${imgs[0]}" onclick="openModal('${imgs[0]}')" id="img${total}">`:''}
</div>
${imgs.length>1?`
<div class="carousel-controls">
<button onclick="prev(${total},${JSON.stringify(imgs)})">◀</button>
<button onclick="next(${total},${JSON.stringify(imgs)})">▶</button>
</div>`:''}
<b>${cat}</b><br>${r['data-base_info-nama']||''}
</div>`;

const m=L.marker([lat,lon]).bindPopup(popup).addTo(map);
m.category=cat;
markers.push(m);
});

document.getElementById("total").innerText="Total: "+total;

createChart();
createTable();
}
});

/* CHART */
let selected=null;
function createChart(){
const labels=Object.keys(counts);
const values=Object.values(counts);

new Chart(document.getElementById("chart"),{
type:'pie',
data:{labels,datasets:[{data:values}]},
options:{
plugins:{legend:{position:'bottom'}},
onClick:(e,el)=>{
if(!el.length)return;
const cat=labels[el[0].index];
selected=selected===cat?null:cat;
filter(cat);
highlightRow(cat);
}
}
});
}

/* TABLE */
function createTable(){
const t=document.getElementById("table");
t.innerHTML="";
Object.entries(counts).forEach(([k,v])=>{
const row=`<tr onclick="rowClick('${k}')"><td>${k}</td><td>${v}</td></tr>`;
t.innerHTML+=row;
});
}

function rowClick(cat){
selected=selected===cat?null:cat;
filter(cat);
}

/* FILTER */
function filter(cat){
markers.forEach(m=>{
m.setOpacity(!cat||m.category===cat?1:0.2);
});
}

/* IMAGE SLIDER */
function next(id,imgs){
const img=document.getElementById("img"+id);
let i=imgs.indexOf(img.src);
i=(i+1)%imgs.length;
img.src=imgs[i];
img.onclick=()=>openModal(imgs[i]);
}
function prev(id,imgs){
const img=document.getElementById("img"+id);
let i=imgs.indexOf(img.src);
i=(i-1+imgs.length)%imgs.length;
img.src=imgs[i];
img.onclick=()=>openModal(imgs[i]);
}

/* MODAL */
function openModal(src){
document.getElementById("modal").style.display="flex";
document.getElementById("modalImg").src=src;
}
document.getElementById("modal").onclick=()=>modal.style.display="none";

/* PANEL */
document.getElementById("handle").onclick=()=>{
panel.classList.toggle("open");
};

/* UTIL */
function convert(u){
if(!u)return null;
const id=u.match(/[-\w]{25,}/);
return id?`https://drive.google.com/thumbnail?id=${id[0]}&sz=w1000`:null;
}

</script>

</body>
</html>
