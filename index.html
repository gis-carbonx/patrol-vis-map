<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patrol Monitoring</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>

<style>
html,body{margin:0;height:100%;font-family:'Segoe UI'}
#map{height:100%}

/* PANEL */
.panel{
position:absolute;
top:20px;
right:20px;
z-index:1000;
width:330px;
background:rgba(255,255,255,0.85);
backdrop-filter:blur(14px);
border-radius:16px;
padding:15px;
box-shadow:0 8px 25px rgba(0,0,0,0.15);
}

/* TOTAL */
.total-wrapper{
display:flex;
justify-content:center;
align-items:center;
gap:10px;
}
.total-main{font-size:28px;font-weight:600;}
.total-sub{font-size:18px;color:#FF5722;display:none;}

/* FILTER */
.filter-box{
display:flex;
gap:5px;
margin-bottom:10px;
}
.filter-box input{
flex:1;
padding:6px;
border-radius:6px;
border:1px solid #ccc;
}

/* BUTTON */
#resetFilter{
margin-top:8px;
width:100%;
padding:7px;
border:none;
border-radius:6px;
background:#111;
color:white;
}

/* TOGGLE */
.toggle{
display:flex;
justify-content:space-between;
margin-top:8px;
font-size:13px;
}

/* ===== POPUP STYLE ===== */
.leaflet-popup-content-wrapper{
border-radius:14px;
padding:0;
overflow:hidden;
}

/* IMAGE FIX SIZE (NOT RATIO) */
.popup-img-container{
width:260px;
height:180px;
overflow:hidden;
background:#eee;
}
.popup-img{
width:100%;
height:100%;
object-fit:cover;
cursor:pointer;
}

/* CONTENT */
.popup-body{padding:10px;}
.popup-category{
font-size:10px;
font-weight:600;
color:#888;
text-transform:uppercase;
margin-bottom:2px;
}
.popup-title{
font-size:14px;
font-weight:600;
margin-bottom:6px;
}
.popup-meta{
font-size:11px;
color:#666;
margin-bottom:6px;
}
.popup-desc{
font-size:12px;
line-height:1.4;
}

/* MODAL ZOOM */
.img-modal{
display:none;
position:fixed;
z-index:9999;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
justify-content:center;
align-items:center;
}
.img-modal img{
max-width:90%;
max-height:90%;
border-radius:10px;
}
</style>
</head>

<body>

<div id="map"></div>

<div class="panel">
<div class="filter-box">
<input type="date" id="startDate">
<input type="date" id="endDate">
</div>

<div class="total-wrapper">
<div id="totalMain" class="total-main">0</div>
<div id="totalSub" class="total-sub"></div>
</div>

<canvas id="chartCanvas" height="180"></canvas>
<button id="resetFilter">Show All</button>

<div class="toggle"><span>LULC</span><input type="checkbox" id="toggleLulc" checked></div>
<div class="toggle"><span>Boundary</span><input type="checkbox" id="toggleBoundary" checked></div>
<div class="toggle"><span>Points</span><input type="checkbox" id="togglePoints" checked></div>
</div>

<!-- MODAL -->
<div id="modal" class="img-modal">
<img id="modalImg">
</div>

<script>

/* ================= MAP ================= */
const map=L.map('map',{center:[0.8,110.325],zoom:13});

L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}')
.addTo(map);

const lulc=L.tileLayer('./data/Tiles/{z}/{x}/{y}.png').addTo(map);

let boundaryLayer;
let pointLayer=L.layerGroup().addTo(map);

/* ================= BOUNDARY ================= */
fetch('data/CMI.json')
.then(r=>r.json())
.then(j=>{
boundaryLayer=L.geoJSON(j,{
style:{
color:"#7B1FA2",
weight:3,
fillOpacity:0   // FIX transparan
}
}).addTo(map);

map.fitBounds(boundaryLayer.getBounds());
});

/* ================= DATA ================= */
const url="https://docs.google.com/spreadsheets/d/e/2PACX-1vRKjzBR_BgGYWpnWUvGYzmo4rLbT2iGm2oI1fzjs1wJdPguDpw2UPZXrZQqcXPrGxwJ7PBeDCzHazAj/pub?output=csv";

let rawData=[];
let chart;

Papa.parse(url,{
download:true,
header:true,
complete:(res)=>{
rawData=res.data;
updateMap();
}
});

/* ================= DATE PARSER (FIX STRONG) ================= */
function parseDate(s){
if(!s) return null;

/* handle multiple format */
let d=new Date(s);
if(!isNaN(d)) return d;

/* fallback: dd/mm/yyyy */
const parts=s.split('/');
if(parts.length===3){
return new Date(parts[2],parts[1]-1,parts[0]);
}

return null;
}

/* ================= UPDATE ================= */
function updateMap(){

pointLayer.clearLayers();

let counts={}, total=0;

const start=parseDate(startDate.value);
const end=parseDate(endDate.value);

rawData.forEach(r=>{

const coord=r['data-coordinate'];
if(!coord) return;

const d=parseDate(r['data-start_date']);

/* FILTER FIX */
if(start && d && d < start) return;
if(end && d && d > end) return;

const [lat,lon]=coord.split(',').map(Number);
if(isNaN(lat)) return;

const cat=r['data-survey-categ']||"Unknown";
const finding=r['data-survey-finding']||"-";

counts[cat]=(counts[cat]||0)+1;
total++;

const img=convert(r['data-documentation-image_1']);

/* ===== POPUP MODERN ===== */
const popup=`
<div>

${img?`
<div class="popup-img-container">
<img class="popup-img zoomable" src="${img}">
</div>`:''}

<div class="popup-body">
<div class="popup-category">${cat}</div>
<div class="popup-title">${finding}</div>

<div class="popup-meta">
Officer: ${r['data-base_info-nama']||'-'}<br>
Date: ${r['data-start_date']||'-'}
</div>

<div class="popup-desc">
${r['data-survey-description']||''}
</div>

</div>
</div>`;

const m=L.marker([lat,lon]).bindPopup(popup);
m.category=cat;
pointLayer.addLayer(m);

});

totalMain.innerText=total;

/* ================= CHART ================= */
if(chart) chart.destroy();

const labels=Object.keys(counts);
const values=Object.values(counts);

chart=new Chart(chartCanvas,{
type:'pie',
data:{labels,datasets:[{data:values,backgroundColor:gen(labels.length)}]},
options:{
plugins:{legend:{position:'bottom'}},
onClick:(e,el)=>{
if(!el.length)return;
highlight(labels[el[0].index],values[el[0].index]);
}
}
});
}

/* ================= FILTER ================= */
function highlight(cat,count){
if(!cat){
totalSub.style.display='none';
pointLayer.eachLayer(m=>m.setOpacity(1));
return;
}
totalSub.style.display='block';
totalSub.innerText=count;

pointLayer.eachLayer(m=>{
m.setOpacity(m.category===cat?1:0.2);
});
}

/* ================= EVENTS ================= */
resetFilter.onclick=()=>{
startDate.value="";
endDate.value="";
updateMap();
};

startDate.onchange=updateMap;
endDate.onchange=updateMap;

/* ================= LAYER CONTROL ================= */
toggleLulc.onchange=e=>e.target.checked?map.addLayer(lulc):map.removeLayer(lulc);

toggleBoundary.onchange=e=>{
if(!boundaryLayer) return;
e.target.checked?map.addLayer(boundaryLayer):map.removeLayer(boundaryLayer);
};

togglePoints.onchange=e=>{
e.target.checked?map.addLayer(pointLayer):map.removeLayer(pointLayer);
};

/* ================= IMAGE ZOOM FIX ================= */
document.addEventListener('click',function(e){
if(e.target.classList.contains('zoomable')){
modal.style.display='flex';
modalImg.src=e.target.src;
}
});

modal.onclick=()=>modal.style.display='none';

/* ================= UTIL ================= */
function convert(url){
if(!url)return null;
const id=url.match(/[-\w]{25,}/);
return id?`https://drive.google.com/thumbnail?id=${id[0]}&sz=w1000`:null;
}

function gen(n){
return Array.from({length:n},(_,i)=>`hsl(${i*360/n},70%,60%)`);
}

</script>

</body>
</html>
