<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patrol Monitoring</title>
  <link rel="icon" type="image/png" href="./data/CMI-Brandmark-FullColor-BlackBG.png">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-dark: #0f1117;
      --bg-panel: rgba(15,17,23,0.92);
      --bg-section: rgba(255,255,255,0.05);
      --bg-hover: rgba(255,255,255,0.08);
      --accent: #4f8ef7;
      --accent2: #a78bfa;
      --success: #34d399;
      --warning: #fbbf24;
      --danger: #f87171;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --border: rgba(255,255,255,0.08);
      --radius: 12px;
      --sidebar-w: 360px;
      --header-h: 56px;
    }

    html, body { height: 100%; font-family: 'Inter', sans-serif; overflow: hidden; background: var(--bg-dark); }

    /* ── Layout ── */
    #app { display: flex; flex-direction: column; height: 100vh; }

    #header {
      height: var(--header-h); background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
      padding: 0 18px; z-index: 2000; flex-shrink: 0;
      backdrop-filter: blur(12px);
    }
    #header img { height: 32px; }
    #header h1 { font-size: 16px; font-weight: 600; color: var(--text-primary); letter-spacing: 0.3px; }
    #header .spacer { flex: 1; }
    #header .badge {
      background: var(--accent); color: white; font-size: 11px;
      font-weight: 600; padding: 3px 10px; border-radius: 20px;
    }

    #body { display: flex; flex: 1; overflow: hidden; }

    /* ── Sidebar ── */
    #sidebar {
      width: var(--sidebar-w); background: var(--bg-panel);
      border-right: 1px solid var(--border); display: flex;
      flex-direction: column; z-index: 1500; flex-shrink: 0;
      backdrop-filter: blur(16px); overflow: hidden;
    }

    /* Sidebar tabs */
    #sidebar-tabs {
      display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .stab {
      flex: 1; padding: 12px 6px; text-align: center; font-size: 11px;
      font-weight: 600; color: var(--text-secondary); cursor: pointer;
      border-bottom: 2px solid transparent; transition: all .2s;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .stab:hover { color: var(--text-primary); background: var(--bg-hover); }
    .stab.active { color: var(--accent); border-bottom-color: var(--accent); }

    #sidebar-content { flex: 1; overflow-y: auto; padding: 14px; }
    #sidebar-content::-webkit-scrollbar { width: 4px; }
    #sidebar-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* Tab panels */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Section blocks */
    .section-block {
      background: var(--bg-section); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px; margin-bottom: 12px;
    }
    .section-title {
      font-size: 11px; font-weight: 600; color: var(--text-secondary);
      text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px;
      display: flex; align-items: center; gap: 6px;
    }
    .section-title::before {
      content: ''; display: block; width: 3px; height: 12px;
      background: var(--accent); border-radius: 2px;
    }

    /* Stats row */
    .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
    .stat-card {
      background: var(--bg-section); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px; text-align: center;
    }
    .stat-card .val { font-size: 24px; font-weight: 700; color: var(--accent); }
    .stat-card .lbl { font-size: 10px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

    /* Filter controls */
    .filter-label { font-size: 11px; color: var(--text-secondary); margin-bottom: 4px; display: block; }
    .filter-input {
      width: 100%; padding: 8px 10px; background: rgba(255,255,255,0.06);
      border: 1px solid var(--border); border-radius: 8px; color: var(--text-primary);
      font-size: 12px; font-family: inherit; margin-bottom: 10px; outline: none;
      transition: border .2s;
    }
    .filter-input:focus { border-color: var(--accent); }
    .filter-input option { background: #1e2130; }

    /* Buttons */
    .btn {
      padding: 8px 14px; border: none; border-radius: 8px; font-family: inherit;
      font-size: 12px; font-weight: 500; cursor: pointer; transition: all .2s;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: #3a7bd5; }
    .btn-secondary { background: var(--bg-section); color: var(--text-primary); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--bg-hover); }
    .btn-danger { background: rgba(248,113,113,0.15); color: var(--danger); border: 1px solid rgba(248,113,113,0.3); }
    .btn-danger:hover { background: rgba(248,113,113,0.25); }
    .btn-block { width: 100%; justify-content: center; margin-bottom: 6px; }

    /* Chart container */
    .chart-wrap { position: relative; width: 100%; }

    /* Data Table */
    #tableSearch {
      width: 100%; padding: 8px 12px; background: rgba(255,255,255,0.06);
      border: 1px solid var(--border); border-radius: 8px; color: var(--text-primary);
      font-size: 12px; font-family: inherit; margin-bottom: 10px; outline: none;
    }
    #tableSearch:focus { border-color: var(--accent); }
    #tableSearch::placeholder { color: var(--text-secondary); }

    #dataTableWrap { overflow-x: auto; border-radius: 8px; border: 1px solid var(--border); }
    #dataTable { width: 100%; border-collapse: collapse; font-size: 11px; }
    #dataTable thead tr { background: rgba(79,142,247,0.15); }
    #dataTable th {
      padding: 8px 10px; text-align: left; color: var(--accent);
      font-weight: 600; text-transform: uppercase; font-size: 10px;
      letter-spacing: 0.5px; border-bottom: 1px solid var(--border);
      cursor: pointer; user-select: none; white-space: nowrap;
    }
    #dataTable th:hover { background: rgba(79,142,247,0.1); }
    #dataTable td {
      padding: 7px 10px; color: var(--text-primary); border-bottom: 1px solid var(--border);
      white-space: nowrap; max-width: 120px; overflow: hidden; text-overflow: ellipsis;
    }
    #dataTable tbody tr { cursor: pointer; transition: background .15s; }
    #dataTable tbody tr:hover { background: var(--bg-hover); }
    #dataTable tbody tr:last-child td { border-bottom: none; }
    .table-pagination {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 4px; font-size: 11px; color: var(--text-secondary); margin-top: 6px;
    }
    .page-btn {
      background: var(--bg-section); border: 1px solid var(--border); color: var(--text-primary);
      padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 11px;
    }
    .page-btn:disabled { opacity: 0.3; cursor: default; }

    /* Map container */
    #map-wrap { flex: 1; position: relative; }
    #map { width: 100%; height: 100%; }

    /* Map overlay controls */
    #map-controls {
      position: absolute; top: 12px; left: 12px; z-index: 1000;
      display: flex; gap: 6px; flex-wrap: wrap;
    }
    .map-ctrl-btn {
      background: var(--bg-panel); border: 1px solid var(--border);
      color: var(--text-primary); padding: 7px 12px; border-radius: 8px;
      font-size: 11px; font-weight: 500; cursor: pointer; font-family: inherit;
      backdrop-filter: blur(8px); transition: all .2s; display: flex; align-items: center; gap: 5px;
    }
    .map-ctrl-btn:hover { border-color: var(--accent); color: var(--accent); }
    .map-ctrl-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(79,142,247,0.1); }

    /* Basemap floating panel */
    #basemapFloating {
      display: none; position: absolute; top: 48px; left: 12px; z-index: 1001;
      background: var(--bg-panel); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 10px; backdrop-filter: blur(12px);
      min-width: 160px;
    }
    #basemapFloating.open { display: block; }
    .bm-opt {
      padding: 7px 10px; border-radius: 8px; cursor: pointer; font-size: 12px;
      color: var(--text-primary); transition: background .15s; display: flex; align-items: center; gap: 8px;
    }
    .bm-opt:hover { background: var(--bg-hover); }
    .bm-opt.selected { color: var(--accent); background: rgba(79,142,247,0.1); }
    .bm-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    /* Measure popup overlay */
    #measureStatus {
      display: none; position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
      z-index: 1001; background: var(--bg-panel); border: 1px solid var(--accent);
      color: var(--text-primary); padding: 8px 16px; border-radius: 20px;
      font-size: 12px; backdrop-filter: blur(8px);
    }
    #measureStatus.visible { display: block; }

    /* Opacity slider */
    #opacityRow { display: flex; align-items: center; gap: 10px; margin-top: 6px; }
    #opacitySlider {
      flex: 1; -webkit-appearance: none; height: 4px; border-radius: 2px;
      background: var(--border); outline: none;
    }
    #opacitySlider::-webkit-slider-thumb {
      -webkit-appearance: none; width: 14px; height: 14px;
      border-radius: 50%; background: var(--accent); cursor: pointer;
    }

    /* Legend items */
    .legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-primary); padding: 3px 0; }
    .legend-dot { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
    .legend-marker { width: 14px; height: 14px; flex-shrink: 0; }

    /* Image modal */
    .img-modal {
      display: none; position: fixed; z-index: 9999; inset: 0;
      background: rgba(0,0,0,0.85); justify-content: center; align-items: center;
      backdrop-filter: blur(4px);
    }
    .img-modal.open { display: flex; }
    .img-modal img { max-width: 90%; max-height: 88vh; border-radius: 10px; box-shadow: 0 20px 60px rgba(0,0,0,0.6); }
    .img-modal-close {
      position: absolute; top: 20px; right: 28px; color: white; font-size: 36px;
      cursor: pointer; line-height: 1; opacity: 0.8; transition: opacity .2s;
    }
    .img-modal-close:hover { opacity: 1; }

    /* Popup content */
    .popup-content { font-family: 'Inter', sans-serif; font-size: 13px; min-width: 200px; max-width: 280px; }
    .popup-content h2 { font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #1e293b; }
    .popup-content p { font-size: 12px; margin: 3px 0; color: #475569; }
    .popup-content img {
      width: 100%; margin-top: 8px; border-radius: 6px; cursor: pointer;
      transition: opacity .2s; max-height: 140px; object-fit: cover;
    }
    .popup-content img:hover { opacity: 0.85; }

    /* Loading overlay */
    #loading {
      position: absolute; inset: 0; background: rgba(15,17,23,0.7);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 2000; color: var(--text-primary); gap: 14px; backdrop-filter: blur(4px);
    }
    .spinner {
      width: 36px; height: 36px; border: 3px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { font-size: 13px; color: var(--text-secondary); }

    /* Scrollbar for sidebar */
    * { scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.1) transparent; }

    .marker-cluster-small, .marker-cluster-medium, .marker-cluster-large {
      background-color: rg
