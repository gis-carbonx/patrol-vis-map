<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>[draft]Patrol Monitoring</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>

<style>
html,body{margin:0;height:100%;background:#0f172a;font-family:sans-serif}
#map{height:100%}

/* GLASS */
.glass{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(12px);
  border-radius:16px;
  color:white;
  box-shadow:0 4px 20px rgba(0,0,0,0.4);
}

/* TOP */
#topbar{
  position:absolute;top:15px;left:15px;z-index:1000;
  padding:10px 16px;display:flex;gap:10px;align-items:center;
}
#topbar img{height:30px}

/* BOTTOM PANEL */
#bottomPanel{
  position:absolute;bottom:0;left:0;right:0;
  height:110px;transition:.3s;z-index:1000;
}
#bottomPanel.expanded{height:55%}

#panelHandle{text-align:center;cursor:pointer;padding:5px}
#panelContent{padding:15px}

/* CARD */
.card{padding:12px;margin-bottom:10px;border-radius:12px}

/* POPUP MODERN */
.popup-card{
  font-family:sans-serif;
}
.popup-header{
  font-weight:bold;
  font-size:14px;
  margin-bottom:5px;
}
.popup-badge{
  display:inline-block;
  padding:2px 6px;
  border-radius:6px;
  font-size:10px;
  background:#22c55e;
  margin-bottom:6px;
}
.popup-img{
  width:100%;
  border-radius:8px;
  margin-top:6px;
  cursor:pointer;
  transition:.2s;
}
.popup-img:hover{transform:scale(1.03)}

.img-modal{
  display:none;position:fixed;top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.9);
  justify-content:center;align-items:center;
  z-index:9999;
}
.img-modal img{max-width:90%;max-height:90%}

</style>
</head>

<body>

<div id="map"></div>

<div id="topbar" class="glass">
  <img src="data/CMI-Brandmark-FullColor-BlackBG.png">
  <span>Patrol Monitoring</span>
</div>

<div id="bottomPanel" class="glass">
  <div id="panelHandle">▲</div>
  <div id="panelContent">

    <div class="card glass">
      <h3 id="totalPoints">0 Observations</h3>
    </div>

    <div class="card glass">
      <canvas id="chart"></canvas>
    </div>

  </div>
</div>

<div id="imageModal" class="img-modal">
  <img id="modalImage">
</div>

<script>

// MAP
const map=L.map('map',{center:[0.8,110.325],zoom:13});
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

// BOUNDARY
fetch('data/CMI.json')
.then(r=>r.json())
.then(j=>{
  const layer=L.geoJSON(j,{style:{color:'purple'}}).addTo(map);
  map.fitBounds(layer.getBounds());
});

// DATA
let total=0, categoryCount={};

Papa.parse("https://docs.google.com/spreadsheets/d/e/2PACX-1vRKjzBR_BgGYWpnWUvGYzmo4rLbT2iGm2oI1fzjs1wJdPguDpw2UPZXrZQqcXPrGxwJ7PBeDCzHazAj/pub?output=csv",{
  download:true,header:true,
  complete:(res)=>{

    res.data.forEach(row=>{
      const coord=row['data-coordinate'];
      if(!coord)return;

      const [lat,lon]=coord.split(',').map(Number);
      if(isNaN(lat))return;

      total++;
      const cat=row['data-survey-categ']||"Unknown";
      categoryCount[cat]=(categoryCount[cat]||0)+1;

      const img1=convertGoogleDriveLink(row['data-documentation-image_1']);
      const img2=convertGoogleDriveLink(row['data-documentation-image_2']);

      const popup=`
      <div class="popup-card">
        <div class="popup-badge">${cat}</div>
        <div class="popup-header">${row['data-survey-finding']||''}</div>
        <div><b>Officer:</b> ${row['data-base_info-nama']||''}</div>
        <div><b>Date:</b> ${row['data-start_date']||''}</div>
        <div>${row['data-survey-description']||''}</div>

        ${img1?`<img class="popup-img" src="${img1}" onclick="openModal('${img1}')">`:''}
        ${img2?`<img class="popup-img" src="${img2}" onclick="openModal('${img2}')">`:''}
      </div>`;

      L.marker([lat,lon]).addTo(map).bindPopup(popup);
    });

    document.getElementById("totalPoints").innerText=total+" Observations";

    // SEMI DOUGHNUT CHART
    new Chart(document.getElementById("chart"),{
      type:'doughnut',
      data:{
        labels:Object.keys(categoryCount),
        datasets:[{
          data:Object.values(categoryCount),
          backgroundColor:[
            '#3b82f6','#f43f5e','#f59e0b','#10b981','#8b5cf6','#9ca3af'
          ]
        }]
      },
      options:{
        rotation:-90,
        circumference:180,
        plugins:{
          legend:{position:'bottom'}
        }
      }
    });

  }
});

// MODAL
function openModal(src){
  const m=document.getElementById("imageModal");
  m.style.display="flex";
  document.getElementById("modalImage").src=src;
}
document.getElementById("imageModal").onclick=()=>{
  document.getElementById("imageModal").style.display="none";
};

// PANEL
document.getElementById("panelHandle").onclick=()=>{
  document.getElementById("bottomPanel").classList.toggle("expanded");
};

// DRIVE IMG
function convertGoogleDriveLink(url){
  if(!url)return null;
  const id=url.match(/[-\w]{25,}/);
  return id?`https://drive.google.com/thumbnail?id=${id[0]}&sz=w1000`:null;
}

</script>

</body>
</html>
