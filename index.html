<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patrol Monitoring</title>

<link rel="icon" href="./data/CMI-Brandmark-FullColor-BlackBG.png">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>

<style>

/* === GLOBAL === */
html, body {
  height: 100%;
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #0f172a;
}

#map {
  height: 100%;
}

/* === GLASS PANEL === */
.panel {
  position: absolute;
  backdrop-filter: blur(12px);
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 16px;
  padding: 12px;
  color: white;
  box-shadow: 0 8px 30px rgba(0,0,0,0.4);
}

/* === TITLE === */
#title {
  top: 20px;
  left: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
}

#title img {
  height: 40px;
}

#title h1 {
  font-size: 20px;
  margin: 0;
}

/* === RIGHT PANEL === */
#infoPanel {
  top: 20px;
  right: 20px;
  width: 300px;
  max-height: 85%;
  overflow-y: auto;
}

/* === BASEMAP === */
#basemapPanel {
  bottom: 20px;
  left: 20px;
  width: 180px;
}

/* === BUTTON === */
button {
  width: 100%;
  margin-top: 6px;
  padding: 8px;
  border-radius: 10px;
  border: none;
  background: rgba(255,255,255,0.15);
  color: white;
  cursor: pointer;
  transition: 0.2s;
}
button:hover {
  background: rgba(255,255,255,0.3);
}

/* === POPUP === */
.leaflet-popup-content {
  font-size: 13px;
}
.popup-img {
  width: 100%;
  border-radius: 10px;
  margin-top: 5px;
}

/* === SCROLL === */
::-webkit-scrollbar {
  width: 6px;
}
::-webkit-scrollbar-thumb {
  background: rgba(255,255,255,0.3);
  border-radius: 10px;
}

</style>
</head>

<body>

<div id="map"></div>

<!-- TITLE -->
<div id="title" class="panel">
  <img src="data/CMI-Brandmark-FullColor-BlackBG.png">
  <h1>Patrol Monitoring</h1>
</div>

<!-- INFO PANEL -->
<div id="infoPanel" class="panel">
  <b>📊 Statistics</b>
  <p id="totalPoints">Total: -</p>
  <canvas id="chart"></canvas>

  <button id="reset">Reset Filter</button>

  <hr>

  <b>📏 Measure</b>
  <button id="measureBtn">Start</button>
  <button id="undoBtn">Undo</button>
  <button id="clearBtn">Clear</button>

  <hr>

  <b>🗺️ LULC Opacity</b>
  <input type="range" id="opacity" min="0" max="1" step="0.1" value="1">

</div>

<!-- BASEMAP -->
<div id="basemapPanel" class="panel"></div>

<script>

// ================= MAP =================
const map = L.map('map', {
  center: [0.8,110.3],
  zoom: 13
});

const basemaps = {
  "Satellite": L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'),
  "OSM": L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'),
  "Topo": L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png')
};

basemaps["Satellite"].addTo(map);

Object.keys(basemaps).forEach(name=>{
  const btn = document.createElement("button");
  btn.innerText = name;
  btn.onclick = ()=>{
    Object.values(basemaps).forEach(b=>map.removeLayer(b));
    basemaps[name].addTo(map);
  };
  document.getElementById("basemapPanel").appendChild(btn);
});

// ================= LULC =================
const lulc = L.tileLayer('./data/Tiles/{z}/{x}/{y}.png').addTo(map);

document.getElementById("opacity").oninput = e=>{
  lulc.setOpacity(e.target.value);
};

// ================= BOUNDARY =================
fetch('data/CMI.json')
.then(r=>r.json())
.then(data=>{
  const layer = L.geoJSON(data,{color:"cyan"}).addTo(map);
  map.fitBounds(layer.getBounds());
});

// ================= DATA =================
let markers = [];
let categoryCount = {};
let total = 0;

Papa.parse("YOUR CSV LINK", {
  download:true,
  header:true,
  complete: res=>{
    res.data.forEach(row=>{
      const coord = row['data-coordinate'];
      if(!coord) return;

      const [lat,lon] = coord.split(',').map(Number);
      if(isNaN(lat)) return;

      total++;

      const cat = row['data-survey-categ'] || "Unknown";
      categoryCount[cat] = (categoryCount[cat]||0)+1;

      const popup = `
        <b>${cat}</b><br>
        ${row['data-survey-finding'] || ''}<br>
        <i>${row['data-base_info-nama']}</i>
      `;

      const m = L.marker([lat,lon]).bindPopup(popup).addTo(map);
      m.category = cat;
      markers.push(m);
    });

    document.getElementById("totalPoints").innerText = "Total: "+total;

    new Chart(document.getElementById("chart"),{
      type:"pie",
      data:{
        labels:Object.keys(categoryCount),
        datasets:[{
          data:Object.values(categoryCount)
        }]
      }
    });
  }
});

// ================= FILTER =================
function filter(cat){
  markers.forEach(m=>{
    m.setOpacity(!cat || m.category===cat ? 1:0.2);
  });
}

// ================= MEASURE =================
let measuring=false;
let line;

document.getElementById("measureBtn").onclick=()=>{
  measuring=!measuring;
};

map.on("click",e=>{
  if(!measuring) return;

  if(!line){
    line=L.polyline([e.latlng]).addTo(map);
  } else {
    line.addLatLng(e.latlng);
  }
});

document.getElementById("clearBtn").onclick=()=>{
  if(line) map.removeLayer(line);
  line=null;
};

</script>

</body>
</html>
