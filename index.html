<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patrol Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>

<style>
html, body { height: 100%; margin: 0; font-family: 'Inter', sans-serif; }
#map { height: 100%; width: 100%; }

/* SIDEBAR */
#sidebar {
  position: absolute;
  top: 0;
  left: 0;
  height: 100%;
  width: 300px;
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(12px);
  box-shadow: 4px 0 20px rgba(0,0,0,0.2);
  padding: 15px;
  overflow-y: auto;
  z-index: 1000;
  transition: transform 0.3s ease;
}

#sidebar.hidden {
  transform: translateX(-100%);
}

#toggleSidebar {
  position: absolute;
  top: 20px;
  left: 310px;
  z-index: 1100;
  background: #111;
  color: white;
  border: none;
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
}

.section-title { font-weight: 700; margin-top: 10px; }

.legend-item { display:flex; align-items:center; font-size:13px; margin:3px 0; }
.legend-color { width:12px; height:12px; margin-right:6px; border-radius:3px; }

canvas { margin-top:10px; }

</style>
</head>

<body>
<div id="map"></div>

<button id="toggleSidebar">☰</button>

<div id="sidebar">

  <div class="section-title">Statistics</div>
  <p id="totalPoints">Total: -</p>
  <canvas id="chart"></canvas>

  <div class="section-title">Layer Control</div>
  <label><input type="checkbox" id="togglePoints" checked> Patrol Points</label><br>
  <label><input type="checkbox" id="toggleLULC" checked> LULC</label><br>
  <label><input type="checkbox" id="toggleGrid" checked> Grid</label>

  <div class="section-title">Legend</div>
  <div class="legend-item"><div class="legend-color" style="background:red"></div>Illegal Logging</div>
  <div class="legend-item"><div class="legend-color" style="background:green"></div>Wildlife</div>
  <div class="legend-item"><div class="legend-color" style="background:orange"></div>Encroachment</div>
  <div class="legend-item"><div class="legend-color" style="background:blue"></div>Other</div>

</div>

<script>

const map = L.map('map', { center:[0.8,110.325], zoom:13, preferCanvas:true });

// BASEMAP FIXED
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

// LAYERS
const lulc = L.tileLayer('./data/Tiles/{z}/{x}/{y}.png');
const gridLayer = L.geoJSON(null,{style:{color:'#555',weight:1,fillOpacity:0}});
const pointLayer = L.layerGroup();

lulc.addTo(map);
gridLayer.addTo(map);
pointLayer.addTo(map);

// LOAD GRID (FIX GEOREFERENCE)
fetch('./data/grid2x2.json')
.then(r=>r.json())
.then(j=>{
  gridLayer.addData(j);
});

// BOUNDARY (FIX FIT ISSUE)
fetch('data/CMI.json')
.then(r=>r.json())
.then(j=>{
  const layer=L.geoJSON(j,{color:'purple'}).addTo(map);
  map.fitBounds(layer.getBounds(), {padding:[20,20]});
});

// DATA
const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRKjzBR_BgGYWpnWUvGYzmo4rLbT2iGm2oI1fzjs1wJdPguDpw2UPZXrZQqcXPrGxwJ7PBeDCzHazAj/pub?output=csv";

let markers=[], categoryCount={}, total=0;

Papa.parse(sheetURL,{
 download:true, header:true,
 complete:(res)=>{
  res.data.forEach(row=>{
    if(!row['data-coordinate']) return;
    const [lat,lon]=row['data-coordinate'].split(',').map(Number);
    if(isNaN(lat)||isNaN(lon)) return;

    total++;
    const cat=row['data-survey-categ']||"Unknown";
    categoryCount[cat]=(categoryCount[cat]||0)+1;

    const marker=L.circleMarker([lat,lon],{
      radius:6,
      color:getColor(cat),
      fillOpacity:0.9
    });

    marker.bindPopup(`<b>${cat}</b><br>${row['data-survey-description']||''}`);
    marker.category=cat;

    pointLayer.addLayer(marker);
    markers.push(marker);
  });

  document.getElementById('totalPoints').innerText=`Total: ${total}`;

  // MODERN BAR CHART
  new Chart(document.getElementById('chart'),{
    type:'bar',
    data:{
      labels:Object.keys(categoryCount),
      datasets:[{
        data:Object.values(categoryCount),
        borderRadius:8
      }]
    },
    options:{
      plugins:{legend:{display:false}},
      scales:{y:{beginAtZero:true}}
    }
  });
 }
});

function getColor(cat){
 const colors={
  "Illegal Logging":"red",
  "Wildlife":"green",
  "Encroachment":"orange"
 };
 return colors[cat]||"blue";
}

// LAYER CONTROL

document.getElementById('togglePoints').onchange=e=>{
  if(e.target.checked) map.addLayer(pointLayer);
  else map.removeLayer(pointLayer);
};

document.getElementById('toggleLULC').onchange=e=>{
  if(e.target.checked) map.addLayer(lulc);
  else map.removeLayer(lulc);
};

document.getElementById('toggleGrid').onchange=e=>{
  if(e.target.checked) map.addLayer(gridLayer);
  else map.removeLayer(gridLayer);
};

// SIDEBAR TOGGLE
const sidebar=document.getElementById('sidebar');
const toggleBtn=document.getElementById('toggleSidebar');

toggleBtn.onclick=()=>{
  sidebar.classList.toggle('hidden');
};

</script>
</body>
</html>
