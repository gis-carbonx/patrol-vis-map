<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Patrol Monitoring</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>

<style>
html,body{margin:0;height:100%;font-family:'Segoe UI'}
#map{height:100%}

/* PANEL */
.panel{
position:absolute;
top:20px;
right:20px;
z-index:1000;
width:340px;
background:rgba(255,255,255,0.88);
backdrop-filter:blur(14px);
border-radius:18px;
padding:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

/* FILTER */
.filter-box{
display:flex;
gap:6px;
margin-bottom:10px;
}
.filter-box input{
flex:1;
padding:7px;
border-radius:6px;
border:1px solid #ccc;
}

/* TOTAL */
.total-wrapper{
display:flex;
justify-content:center;
align-items:center;
gap:10px;
margin-bottom:8px;
}
.total-main{font-size:30px;font-weight:700;}
.total-sub{font-size:18px;color:#FF5722;display:none;}

/* BUTTON */
#resetFilter{
margin-top:10px;
width:100%;
padding:8px;
border:none;
border-radius:8px;
background:#111;
color:white;
cursor:pointer;
}

/* TOGGLE */
.toggle{
display:flex;
justify-content:space-between;
margin-top:10px;
font-size:13px;
}

/* ===== POPUP STYLE ===== */
.leaflet-popup-content-wrapper{
border-radius:16px;
padding:0;
overflow:hidden;
width:260px !important;
}

/* IMAGE FIX SIZE (NOT RATIO) */
.popup-img-container{
width:260px;
height:180px;
background:#eee;
overflow:hidden;
}
.popup-img{
width:100%;
height:100%;
object-fit:cover;
cursor:pointer;
}

/* CONTENT */
.popup-body{padding:12px;}
.popup-category{
font-size:10px;
font-weight:700;
color:#888;
text-transform:uppercase;
letter-spacing:0.5px;
}
.popup-title{
font-size:14px;
font-weight:700;
margin:4px 0 6px;
}
.popup-meta{
font-size:11px;
color:#666;
margin-bottom:6px;
}
.popup-desc{
font-size:12px;
line-height:1.45;
color:#333;
}

/* MODAL ZOOM */
.img-modal{
display:none;
position:fixed;
z-index:9999;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
}
.img-modal img{
max-width:90%;
max-height:90%;
border-radius:12px;
}
</style>
</head>

<body>

<div id="map"></div>

<div class="panel">
<div class="filter-box">
<input type="date" id="startDate">
<input type="date" id="endDate">
</div>

<div class="total-wrapper">
<div id="totalMain" class="total-main">0</div>
<div id="totalSub" class="total-sub"></div>
</div>

<canvas id="chart" height="180"></canvas>
<button id="resetFilter">Show All</button>

<div class="toggle"><span>LULC</span><input type="checkbox" id="toggleLulc" checked></div>
<div class="toggle"><span>Boundary</span><input type="checkbox" id="toggleBoundary" checked></div>
<div class="toggle"><span>Points</span><input type="checkbox" id="togglePoints" checked></div>
</div>

<!-- IMAGE MODAL -->
<div id="modal" class="img-modal">
<img id="modalImg">
</div>

<script>

/* MAP */
const map=L.map('map',{center:[0.8,110.325],zoom:13});
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

const lulc=L.tileLayer('./data/Tiles/{z}/{x}/{y}.png').addTo(map);
let boundaryLayer;
let pointLayer=L.layerGroup().addTo(map);

/* BOUNDARY (TRANSPARENT FILL) */
fetch('data/CMI.json')
.then(r=>r.json())
.then(j=>{
boundaryLayer=L.geoJSON(j,{
style:{
color:"#7B1FA2",
weight:3,
fillOpacity:0
}
}).addTo(map);
map.fitBounds(boundaryLayer.getBounds());
});

/* DATA */
const url="https://docs.google.com/spreadsheets/d/e/2PACX-1vRKjzBR_BgGYWpnWUvGYzmo4rLbT2iGm2oI1fzjs1wJdPguDpw2UPZXrZQqcXPrGxwJ7PBeDCzHazAj/pub?output=csv";

let rawData=[];
let chart;

Papa.parse(url,{
download:true,
header:true,
complete:(res)=>{
rawData=res.data;
updateMap();
}
});

/* DATE SAFE PARSER */
function parseDate(val){
if(!val) return null;
const d=new Date(val);
return isNaN(d)?null:d;
}

/* MAIN UPDATE */
function updateMap(){

pointLayer.clearLayers();

let counts={}, total=0;
const start=parseDate(startDate.value);
const end=parseDate(endDate.value);

rawData.forEach(r=>{

const coord=r['data-coordinate'];
if(!coord) return;

const d=parseDate(r['data-start_date']);
if(start && d && d<start) return;
if(end && d && d>end) return;

const [lat,lon]=coord.split(',').map(Number);
if(isNaN(lat)) return;

const cat=r['data-survey-categ']||"Unknown";
const finding=r['data-survey-finding']||"-";

counts[cat]=(counts[cat]||0)+1;
total++;

const img=convert(r['data-documentation-image_1']);

/* POPUP MODERN */
const popup=`
<div>
${img?`<div class="popup-img-container">
<img class="popup-img zoomable" src="${img}">
</div>`:''}

<div class="popup-body">
<div class="popup-category">${cat}</div>
<div class="popup-title">${finding}</div>

<div class="popup-meta">
<b>Officer:</b> ${r['data-base_info-nama']||'-'}<br>
<b>Date:</b> ${r['data-start_date']||'-'}
</div>

<div class="popup-desc">
${r['data-survey-description']||''}
</div>
</div>
</div>`;

const m=L.marker([lat,lon]).bindPopup(popup);
m.category=cat;
pointLayer.addLayer(m);

});

/* TOTAL */
totalMain.innerText=total;

/* CHART */
if(chart) chart.destroy();

const labels=Object.keys(counts);
const values=Object.values(counts);

chart=new Chart(chartCanvas,{
type:'pie',
data:{labels,datasets:[{data:values,backgroundColor:gen(labels.length)}]},
options:{
plugins:{legend:{position:'bottom'}},
onClick:(e,el)=>{
if(!el.length)return;
highlight(labels[el[0].index],values[el[0].index]);
}
}
});
}

/* FILTER CATEGORY */
function highlight(cat,count){
if(!cat){
totalSub.style.display='none';
pointLayer.eachLayer(m=>m.setOpacity(1));
return;
}
totalSub.style.display='block';
totalSub.innerText=count;
pointLayer.eachLayer(m=>{
m.setOpacity(m.category===cat?1:0.2);
});
}

/* EVENTS */
resetFilter.onclick=()=>{
startDate.value="";
endDate.value="";
updateMap();
};
startDate.onchange=updateMap;
endDate.onchange=updateMap;

/* LAYER CONTROL */
toggleLulc.onchange=e=>e.target.checked?map.addLayer(lulc):map.removeLayer(lulc);
toggleBoundary.onchange=e=>boundaryLayer&&(e.target.checked?map.addLayer(boundaryLayer):map.removeLayer(boundaryLayer));
togglePoints.onchange=e=>e.target.checked?map.addLayer(pointLayer):map.removeLayer(pointLayer);

/* UTIL */
function convert(url){
if(!url)return null;
const id=url.match(/[-\w]{25,}/);
return id?`https://drive.google.com/thumbnail?id=${id[0]}&sz=w1000`:null;
}
function gen(n){return Array.from({length:n},(_,i)=>`hsl(${i*360/n},70%,60%)`)}

/* IMAGE CLICK → MODAL */
document.addEventListener('click',function(e){
if(e.target.classList.contains('zoomable')){
modal.style.display='flex';
modalImg.src=e.target.src;
}
});
modal.onclick=()=>modal.style.display='none';

</script>

</body>
</html>
